<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧶 뜨개질 도안 OCR → 노션</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nanum+Myeongjo:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>

<style>
  :root {
    --cream: #F5F0E8;
    --warm-white: #FDFAF4;
    --yarn-rose: #C4846A;
    --yarn-sage: #7A9E7E;
    --yarn-mustard: #C9A84C;
    --yarn-lavender: #9B8EC4;
    --dark: #2C2418;
    --mid: #6B5B47;
    --light-mid: #A8947A;
    --border: #D9CDB8;
    --shadow: rgba(44, 36, 24, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    background-size: 40px 40px;
    min-height: 100vh;
    font-family: 'Nanum Myeongjo', serif;
    color: var(--dark);
    padding: 24px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 32px;
    position: relative;
  }

  .header::before {
    content: '';
    display: block;
    width: 80px;
    height: 3px;
    background: var(--yarn-rose);
    margin: 0 auto 20px;
    border-radius: 2px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .header h1 span { color: var(--yarn-rose); font-style: italic; }

  .header p {
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--mid);
    letter-spacing: 0.3px;
  }

  .yarn-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .yarn-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  .yarn-dots span:nth-child(1) { background: var(--yarn-rose); animation-delay: 0s; }
  .yarn-dots span:nth-child(2) { background: var(--yarn-mustard); animation-delay: 0.3s; }
  .yarn-dots span:nth-child(3) { background: var(--yarn-sage); animation-delay: 0.6s; }
  .yarn-dots span:nth-child(4) { background: var(--yarn-lavender); animation-delay: 0.9s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.4); opacity: 1; }
  }

  /* CARD */
  .card {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 4px 24px var(--shadow);
    transition: box-shadow 0.2s;
  }

  .card:hover { box-shadow: 0 8px 32px var(--shadow); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: var(--yarn-rose);
    color: white;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* SETTINGS */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .setting-item label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--mid);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .setting-item input, .setting-item select {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .setting-item input:focus, .setting-item select:focus {
    border-color: var(--yarn-rose);
    box-shadow: 0 0 0 3px rgba(196, 132, 106, 0.15);
  }

  .setting-item input::placeholder { color: var(--light-mid); }

  .hint {
    font-size: 0.72rem;
    color: var(--light-mid);
    margin-top: 5px;
    line-height: 1.4;
  }

  /* DROP ZONE */
  .drop-zone {
    border: 2.5px dashed var(--border);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    background: var(--cream);
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(196,132,106,0.08), transparent 60%);
    pointer-events: none;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--yarn-rose);
    background: rgba(196,132,106,0.04);
  }

  .drop-zone.drag-over { transform: scale(1.01); }

  .drop-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
    animation: sway 3s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .drop-zone h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 6px;
  }

  .drop-zone p { font-size: 0.83rem; color: var(--mid); }

  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  /* FILE INFO */
  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-top: 14px;
  }

  .file-info.show { display: flex; }

  .file-icon { font-size: 1.5rem; }

  .file-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--dark);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size { font-size: 0.75rem; color: var(--mid); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 22px;
    border: none;
    border-radius: 10px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .btn-primary {
    background: var(--yarn-rose);
    color: white;
    box-shadow: 0 3px 12px rgba(196,132,106,0.35);
  }

  .btn-primary:hover:not(:disabled) {
    background: #B5735A;
    transform: translateY(-1px);
    box-shadow: 0 5px 16px rgba(196,132,106,0.4);
  }

  .btn-primary:disabled {
    opacity: 0.5; cursor: not-allowed;
  }

  .btn-secondary {
    background: var(--cream);
    color: var(--dark);
    border: 1.5px solid var(--border);
  }

  .btn-secondary:hover:not(:disabled) {
    border-color: var(--yarn-rose);
    color: var(--yarn-rose);
    transform: translateY(-1px);
  }

  .btn-notion {
    background: var(--dark);
    color: white;
    box-shadow: 0 3px 12px rgba(44,36,24,0.25);
  }

  .btn-notion:hover:not(:disabled) {
    background: #3D3222;
    transform: translateY(-1px);
  }

  .btn-sage {
    background: var(--yarn-sage);
    color: white;
  }

  .btn-sage:hover:not(:disabled) {
    background: #698E6D;
    transform: translateY(-1px);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  /* PROGRESS */
  .progress-area {
    display: none;
    margin-top: 16px;
  }

  .progress-area.show { display: block; }

  .progress-label {
    font-size: 0.8rem;
    color: var(--mid);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--yarn-rose), var(--yarn-mustard));
    border-radius: 100px;
    width: 0%;
    transition: width 0.3s ease;
    position: relative;
  }

  .progress-bar::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: rgba(255,255,255,0.4);
    animation: shimmer 1s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
  }

  .log-list {
    margin-top: 12px;
    max-height: 120px;
    overflow-y: auto;
    padding: 12px;
    background: var(--cream);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .log-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--mid);
    padding: 2px 0;
    animation: slideIn 0.2s ease;
  }

  .log-item.success { color: var(--yarn-sage); }
  .log-item.error { color: var(--yarn-rose); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* RESULT */
  .result-area {
    display: none;
  }

  .result-area.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--mid);
    background: var(--cream);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .result-text {
    width: 100%;
    min-height: 300px;
    padding: 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--cream);
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--dark);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  .result-text:focus {
    border-color: var(--yarn-rose);
    box-shadow: 0 0 0 3px rgba(196,132,106,0.1);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--cream);
    padding: 4px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 8px 12px;
    border: none;
    background: none;
    border-radius: 8px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: white;
    color: var(--dark);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* NOTION SECTION */
  .notion-section {
    border-top: 1.5px solid var(--border);
    padding-top: 20px;
    margin-top: 20px;
  }

  .notion-method {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .method-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--cream);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Nanum Myeongjo', serif;
  }

  .method-btn:hover { border-color: var(--yarn-rose); }
  .method-btn.active { border-color: var(--yarn-rose); background: rgba(196,132,106,0.06); }
  .method-btn .method-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .method-btn .method-name { font-size: 0.78rem; font-weight: 700; color: var(--dark); }
  .method-btn .method-desc { font-size: 0.7rem; color: var(--mid); }

  .method-panel { display: none; }
  .method-panel.active { display: block; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: white;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* NOTICE BOX */
  .notice {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.8rem;
    line-height: 1.6;
    margin-bottom: 14px;
    border-left: 3px solid;
  }

  .notice.info { background: rgba(155,142,196,0.1); border-color: var(--yarn-lavender); color: #5A4E8A; }
  .notice.warn { background: rgba(201,168,76,0.1); border-color: var(--yarn-mustard); color: #8A7030; }
  .notice.success { background: rgba(122,158,126,0.1); border-color: var(--yarn-sage); color: #4A7A50; }

  /* STATUS CHIP */
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--cream);
    border: 1px solid var(--border);
    color: var(--mid);
  }

  .status-chip.ok { border-color: var(--yarn-sage); color: var(--yarn-sage); }
  .status-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* AI CLEAN BOX */
  .ai-clean-box {
    background: linear-gradient(135deg, rgba(122,158,126,0.06), rgba(201,168,76,0.06));
    border: 2px solid var(--yarn-sage);
    border-radius: 14px;
    padding: 22px;
  }

  .ai-clean-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 10px;
  }

  details > summary {
    font-family: 'DM Mono', monospace;
    list-style: none;
  }
  details > summary::-webkit-details-marker { display: none; }
  details > summary::before { content: '▶ '; font-size: 0.6rem; }
  details[open] > summary::before { content: '▼ '; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 24px 0 12px;
    font-size: 0.75rem;
    color: var(--light-mid);
    letter-spacing: 0.3px;
  }

  .footer a { color: var(--yarn-rose); text-decoration: none; }

  @media (max-width: 600px) {
    .settings-grid { grid-template-columns: 1fr; }
    .notion-method { flex-direction: column; }
    body { padding: 14px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>🧶 뜨개질 도안 <span>OCR</span></h1>
    <p>PDF를 업로드하면 글자를 읽어서 노션에 옮겨드려요</p>
    <div class="yarn-dots">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <div class="card-title">
      ⚙️ 설정
      <span class="badge">STEP 1</span>
    </div>

    <div class="settings-grid">
      <div class="setting-item">
        <label>추출 방식</label>
        <select id="extractMode">
          <option value="auto">🔄 자동 감지 (권장)</option>
          <option value="text">📄 텍스트형 PDF</option>
          <option value="ocr">🔍 이미지형 PDF (OCR)</option>
        </select>
        <div class="hint">이미지형 도안은 OCR 또는 Claude AI 선택</div>
      </div>

      <div class="setting-item">
        <label>OCR 언어</label>
        <select id="ocrLang">
          <option value="kor+eng">한국어 + 영어</option>
          <option value="kor">한국어</option>
          <option value="eng">영어만</option>
          <option value="jpn+eng">일본어 + 영어</option>
        </select>
      </div>
    </div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="card">
    <div class="card-title">
      📄 PDF 업로드
      <span class="badge">STEP 2</span>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <span class="drop-icon">🗂</span>
      <h3>PDF 파일을 여기에 드래그하거나 클릭</h3>
      <p>뜨개질 도안, 패턴 설명서 등 PDF 파일 지원</p>
    </div>

    <div class="file-info" id="fileInfo">
      <span class="file-icon">📋</span>
      <span class="file-name" id="fileName">—</span>
      <span class="file-size" id="fileSize">—</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" disabled onclick="startExtraction()">
        🔍 텍스트 추출 시작
      </button>
      <button class="btn btn-secondary" onclick="resetAll()">
        ↺ 초기화
      </button>
    </div>

    <!-- PROGRESS -->
    <div class="progress-area" id="progressArea">
      <div class="progress-label" id="progressLabel">준비 중...</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card result-area" id="resultArea">
    <div class="card-title">
      ✨ 추출 결과
      <span class="badge">STEP 3</span>
      <span class="char-count" id="charCount">0 글자</span>
    </div>

    <!-- 원문 -->
    <textarea class="result-text" id="rawText" style="min-height:320px;" placeholder="추출된 텍스트가 여기에 나타납니다..."></textarea>

    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-notion" onclick="copyToClipboard()" style="flex:1;justify-content:center;padding:14px;font-size:1rem;">
        📋 복사하기 (노션 붙여넣기용)
      </button>
    </div>
    <div class="notice success" style="margin-top:12px;">
      💡 복사 후 노션 페이지에서 <strong>Ctrl+V</strong> (Mac: Cmd+V) 로 붙여넣기 하세요
    </div>

  </div>

  <div class="footer">
    Made with 🧶 · <a href="https://github.com" target="_blank">GitHub Pages로 무료 호스팅</a> · 노션 임베드 지원
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let currentFile = null;
let extractedText = '';
let isProcessing = false;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ==================== SETTINGS ====================


// Load saved settings
window.addEventListener('load', () => {
  const savedKey = localStorage.getItem('groq_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

});

// ==================== FILE HANDLING ====================
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file?.type === 'application/pdf') handleFile(file);
  else showToast('❌ PDF 파일만 업로드 가능합니다');
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  currentFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resultArea').classList.remove('show');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ==================== EXTRACTION ====================
async function startExtraction() {
  if (!currentFile || isProcessing) return;
  isProcessing = true;

  const mode = document.getElementById('extractMode').value;
  const progressArea = document.getElementById('progressArea');
  progressArea.classList.add('show');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('logList').innerHTML = '';

  try {
    let text = '';

    if (mode === 'auto') {
      addLog('🔄 PDF 분석 중...', '');
      text = await extractAuto();
    } else if (mode === 'text') {
      text = await extractText();
    } else if (mode === 'ocr') {
      text = await extractOCR();
    }

    extractedText = text;
    displayResult(text);

  } catch (err) {
    addLog('❌ 오류: ' + err.message, 'error');
    showToast('❌ 추출 실패: ' + err.message);
  } finally {
    isProcessing = false;
    document.getElementById('startBtn').disabled = false;
  }
}

async function extractAuto() {
  setProgress(10, 'PDF 열기...');
  addLog('📂 PDF 로드 중', '');

  const text = await extractText(true);

  if (text.trim().length > 50) {
    addLog('✅ 텍스트형 PDF 감지 - 직접 추출 성공', 'success');
    return text;
  } else {
    addLog('🔍 이미지형 PDF 감지 - OCR로 전환', '');
    return await extractOCR();
  }
}

async function extractText(silent = false) {
  if (!silent) { setProgress(10, 'PDF 로드...'); addLog('📂 파일 읽는 중', ''); }

  const arrayBuffer = await currentFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
  const totalPages = pdf.numPages;

  if (!silent) addLog(`📄 총 ${totalPages}페이지 발견`, '');

  let fullText = '';

  for (let i = 1; i <= totalPages; i++) {
    setProgress(10 + (i / totalPages) * 80, `${i}/${totalPages} 페이지 추출 중...`);
    if (!silent) addLog(`  페이지 ${i} 처리...`, '');

    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = reconstructLines(content.items);

    if (pageText.trim()) {
      fullText += `\n\n─── 페이지 ${i} ───\n${pageText}`;
    }
  }

  setProgress(100, '완료!');
  if (!silent) addLog(`✅ 추출 완료 (${fullText.length} 글자)`, 'success');
  return fullText.trim();
}

// ══════════════════════════════════════════════════════════════════════
// PDF 텍스트 복원 메인 함수
// 접근법: 패턴 추측 대신 "이 문서의 실제 줄간격"을 측정해서 판단
// ══════════════════════════════════════════════════════════════════════
function reconstructLines(items) {
  if (!items.length) return '';

  // 1) 토큰 추출
  const tokens = items
    .filter(item => item.str.trim())
    .map(item => ({
      x: item.transform[4],
      y: item.transform[5],
      text: item.str,
      fontSize: Math.abs(item.transform[3]) || 10
    }));
  if (!tokens.length) return '';

  // 2) Y좌표 기준으로 물리적 줄 묶기
  const physicalLines = groupIntoLines(tokens);

  // 3) 이 문서의 줄간격 분포를 측정해서 기준값 산출
  const { normalGap, paraGap } = measureLineSpacing(physicalLines);

  // 4) 줄간격에 따라 같은 문단끼리 합치기
  const paragraphs = mergeParagraphs(physicalLines, normalGap, paraGap);

  // 5) 각 문단 내 띄어쓰기 보정
  return paragraphs
    .map(fixSpacing)
    .join('\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// ── 물리적 줄 묶기: Y 허용 오차 내 토큰 → 한 줄 ─────────────────────
function groupIntoLines(tokens) {
  const lines = [];
  let cur = [tokens[0]];

  for (let i = 1; i < tokens.length; i++) {
    const t = tokens[i];
    const tol = cur[0].fontSize * 0.45;
    if (Math.abs(t.y - cur[0].y) <= tol) {
      cur.push(t);
    } else {
      lines.push(cur);
      cur = [t];
    }
  }
  lines.push(cur);

  // PDF Y축 = 아래→위, 내림차순으로 정렬 = 문서 위→아래
  lines.sort((a, b) => b[0].y - a[0].y);

  // 각 줄 내 X 정렬 + 토큰 합치기
  return lines.map(line => {
    line.sort((a, b) => a.x - b.x);
    let text = line[0].text;
    for (let i = 1; i < line.length; i++) {
      const prev = line[i-1], curr = line[i];
      const prevEnd = prev.x + prev.text.length * prev.fontSize * 0.52;
      const gap = curr.x - prevEnd;
      text += gap > prev.fontSize * 0.25 ? ' ' + curr.text : curr.text;
    }
    return {
      text: text.trim(),
      y: line[0].y,
      fontSize: line[0].fontSize
    };
  }).filter(l => l.text.length > 0);
}

// ── 줄간격 측정: 이 문서의 '보통 줄간격'과 '단락 구분 간격' 산출 ──────
function measureLineSpacing(lines) {
  if (lines.length < 2) return { normalGap: 20, paraGap: 35 };

  // 연속된 줄들 사이의 Y 간격 수집
  const gaps = [];
  for (let i = 0; i < lines.length - 1; i++) {
    const gap = lines[i].y - lines[i+1].y; // 위 줄 Y - 아래 줄 Y (양수)
    if (gap > 0 && gap < 200) gaps.push(gap);
  }
  if (!gaps.length) return { normalGap: 20, paraGap: 35 };

  // 중앙값을 '보통 줄간격'으로 사용 (평균보다 이상치에 강함)
  gaps.sort((a, b) => a - b);
  const median = gaps[Math.floor(gaps.length / 2)];

  // 보통 줄간격의 1.6배 이상 = 단락 구분으로 판단
  const normalGap = median * 1.3;  // 같은 문단으로 볼 최대 간격
  const paraGap   = median * 1.6;  // 새 단락으로 볼 최소 간격

  return { normalGap, paraGap };
}

// ── 문단 합치기: 줄간격 기준으로 같은 문단 내 줄은 이어붙임 ───────────
function mergeParagraphs(lines, normalGap, paraGap) {
  if (!lines.length) return [];

  const result   = [];
  let paraBuffer = lines[0].text;
  let prevY      = lines[0].y;
  let prevFS     = lines[0].fontSize;

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const gap  = prevY - line.y; // 이전 줄 Y - 현재 줄 Y

    // 뜨개 도안 특수 패턴: 항상 새 줄로 시작해야 하는 것들
    const forceNewLine = /^(\d+\s*[단행코]|Row\s*\d|Round\s*\d|Rnd\s*\d|[①-⑳◆■●▶]|[-─━]+$)/i.test(line.text);

    if (forceNewLine || gap > normalGap) {
      // 새 줄 or 새 단락
      result.push(paraBuffer);
      if (gap > paraGap) result.push(''); // 단락 사이 빈 줄
      paraBuffer = line.text;
    } else {
      // 같은 문단 내 줄바꿈 → 이어붙이기
      const lastChar  = paraBuffer.slice(-1);
      const firstChar = line.text.charAt(0);
      const isKor = ch => /[가-힣]/.test(ch);
      const isAlp = ch => /[a-zA-Z0-9]/.test(ch);

      if (isKor(lastChar) && isKor(firstChar)) {
        paraBuffer += line.text;       // 한글-한글: 공백 없이
      } else if (isAlp(lastChar) && isAlp(firstChar)) {
        paraBuffer += line.text;       // 영문-영문: 공백 없이 (k2tog 등)
      } else {
        paraBuffer += ' ' + line.text; // 그 외: 공백 하나
      }
    }
    prevY  = line.y;
    prevFS = line.fontSize;
  }
  if (paraBuffer) result.push(paraBuffer);

  return result;
}

// ── 띄어쓰기 보정: 좌표로 못 잡는 경계 규칙 보정 ─────────────────────
function fixSpacing(text) {
  return text
    .replace(/(\d)([가-힣])/g,          '$1 $2')  // 10코 → 10 코
    .replace(/([가-힣])(\d)/g,          '$1 $2')  // 코10 → 코 10
    .replace(/([a-zA-Z])([가-힣])/g,     '$1 $2')  // k뜨기 → k 뜨기
    .replace(/([가-힣])([a-zA-Z])/g,     '$1 $2')  // 뜨기k → 뜨기 k
    .replace(/([가-힣a-zA-Z0-9])([({[])/g,'$1 $2') // 반복( → 반복 (
    .replace(/([)}\]])([가-힣a-zA-Z0-9])/g,'$1 $2')
    .replace(/  +/g, ' ')
    .trim();
}

async function extractOCR() {
  setProgress(5, 'OCR 엔진 초기화...');
  addLog('🔍 Tesseract OCR 시작', '');

  const lang = document.getElementById('ocrLang').value;
  const arrayBuffer = await currentFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
  const totalPages = pdf.numPages;

  addLog(`📄 총 ${totalPages}페이지 · 언어: ${lang}`, '');

  const worker = await Tesseract.createWorker(lang, 1, {
    logger: m => {
      if (m.status === 'recognizing text') {
        const pageProgress = (m.progress * 100).toFixed(0);
        document.getElementById('progressLabel').textContent = `OCR 진행: ${pageProgress}%`;
      }
    }
  });

  let fullText = '';

  for (let i = 1; i <= totalPages; i++) {
    const baseProgress = 10 + ((i - 1) / totalPages) * 85;
    setProgress(baseProgress, `페이지 ${i}/${totalPages} OCR 중...`);
    addLog(`  📷 페이지 ${i} 이미지 변환 및 OCR...`, '');

    const page = await pdf.getPage(i);
    const scale = 2.5;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport
    }).promise;

    const { data: { text } } = await worker.recognize(canvas);
    if (text.trim()) {
      fullText += `\n\n─── 페이지 ${i} ───\n${text}`;
    }
    addLog(`  ✓ 페이지 ${i} 완료`, 'success');
  }

  await worker.terminate();
  setProgress(100, 'OCR 완료!');
  addLog(`✅ 전체 OCR 완료 (${fullText.length} 글자)`, 'success');
  return fullText.trim();
}

// ==================== DISPLAY ====================
function displayResult(text) {
  document.getElementById('rawText').value = text;
  document.getElementById('charCount').textContent = text.length.toLocaleString() + ' 글자';
  document.getElementById('resultArea').classList.add('show');

  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  showToast('✅ 추출 완료! 복사 버튼을 눌러 노션에 붙여넣기 하세요');

// ==================== CLAUDE 정리 ====================
function copyToClipboard(type) {
  const id = (type === 'clean' && document.getElementById('cleanText')) ? 'cleanText' : 'rawText';
  const text = document.getElementById(id).value;
  if (!text) { showToast('❌ 복사할 텍스트가 없습니다'); return; }

  // 줄넘김 유지: pre-wrap div를 화면 밖에 만들어 브라우저 기본 복사 사용
  // → 브라우저가 HTML(줄넘김 포함) + plain text 두 형식을 자동으로 클립보드에 담음
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.style.cssText = 'position:fixed;left:-9999px;top:0;white-space:pre-wrap;font-family:monospace;font-size:14px;width:600px;';
  div.textContent = text;
  document.body.appendChild(div);

  div.focus();
  const range = document.createRange();
  range.selectNodeContents(div);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  sel.removeAllRanges();
  document.body.removeChild(div);

  if (ok) {
    showToast('✅ 복사 완료! 노션 페이지에서 Ctrl+V 하세요');
  } else {
    // 최후 폴백
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 복사 완료! 노션에 Ctrl+V 하세요');
    }).catch(() => showToast('❌ 복사 실패 — 텍스트를 직접 선택해서 복사해주세요'));
  }
}



// ==================== UTILS ====================
function setProgress(pct, label) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function addLog(msg, type) {
  const list = document.getElementById('logList');
  const item = document.createElement('div');
  item.className = 'log-item' + (type ? ' ' + type : '');
  item.textContent = msg;
  list.appendChild(item);
  list.scrollTop = list.scrollHeight;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function resetAll() {
  currentFile = null;
  extractedText = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').classList.remove('show');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('progressArea').classList.remove('show');
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('rawText').value = '';
  document.getElementById('cleanText').value = '';

  setProgress(0, '');
  document.getElementById('logList').innerHTML = '';
}
