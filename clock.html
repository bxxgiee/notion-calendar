<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:transparent;
font-family:system-ui;
}

.card{

width:260px;
padding:18px;
border-radius:24px;

background:var(--theme,#ffd9e2);

box-shadow:
0 12px 25px rgba(0,0,0,.15),
inset 0 0 0 3px rgba(255,255,255,.5);

}

.top{

display:flex;
justify-content:space-between;

font-size:12px;
font-weight:600;
color:#e18a9c;

margin-bottom:10px;

}

.screen{

background:#f1f3f5;
border-radius:16px;

padding:20px;
text-align:center;

box-shadow:
inset 0 6px 8px rgba(0,0,0,.05),
inset 0 -6px 8px rgba(255,255,255,.7);

}

.time{

font-family:monospace;
font-size:50px;
letter-spacing:3px;
color:#666;

}

.ampm{

font-size:14px;
color:#ff9fb3;

}

</style>

</head>

<body>

<div class="card">

<div class="top">
<span id="date"></span>
<span>•••</span>
</div>

<div class="screen">

<span class="time" id="time"></span>
<span class="ampm" id="ampm"></span>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search)
const theme=params.get("theme")

if(theme){

document.querySelector(".card").style.background=theme

}

function clock(){

const now=new Date()

let h=now.getHours()
let m=now.getMinutes()

let ampm=h>=12?"PM":"AM"

h=h%12
h=h?h:12

m=m<10?"0"+m:m

time.innerText=h+":"+m
ampm.innerText=" "+ampm

date.innerText=
now.toLocaleDateString("en-US",{month:"short",day:"numeric",weekday:"short"}).toUpperCase()

}

setInterval(clock,1000)
clock()

</script>

</body>
</html>
