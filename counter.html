<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧶 단수 카운터</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root {
    --bg:       #FAF7F3;
    --surface:  #FFFFFF;
    --border:   #E8E0D5;
    --border2:  #D4C9BA;
    --amber:    #C8845A;
    --amber-lt: #F5E6D8;
    --amber-dk: #A86A42;
    --sage:     #6A9E72;
    --sage-lt:  #E0EFE2;
    --rose:     #C06060;
    --rose-lt:  #F5E0E0;
    --ink:      #2A2018;
    --ink2:     #5A4E40;
    --ink3:     #9A8C7C;
    --ink4:     #C4B8A8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: var(--ink);
    padding-bottom: 48px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky; top: 0; z-index: 10;
  }
  .logo-box {
    width: 34px; height: 34px;
    background: var(--amber-lt);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .logo-text { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; }

  /* TABS */
  .tabs-row {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-row::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--ink2);
    white-space: nowrap;
    position: relative;
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active {
    background: var(--amber);
    border-color: var(--amber);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(200,132,90,0.3);
  }
  .tab-x {
    display: none;
    position: absolute;
    top: -7px; right: -7px;
    width: 17px; height: 17px;
    background: var(--rose);
    border: 2px solid var(--bg);
    border-radius: 50%;
    font-size: 0.58rem;
    font-weight: 700;
    color: #fff;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
  }
  .tab:hover .tab-x { display: flex; }

  .btn-add-tab {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px dashed var(--border2);
    background: none;
    color: var(--ink3);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-add-tab:hover { border-color: var(--amber); color: var(--amber); }

  /* MAIN */
  .main {
    padding: 18px 16px;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(42,32,24,0.06);
  }

  /* 이름 행 */
  .name-row {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .name-inp {
    flex: 1;
    font-family: 'Pretendard', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: var(--ink);
    background: none; border: none; outline: none;
  }
  .name-inp::placeholder { color: var(--ink4); font-weight: 400; }

  .parity-pill {
    font-size: 0.71rem; font-weight: 600;
    padding: 4px 9px; border-radius: 99px;
    white-space: nowrap; transition: all 0.2s;
  }
  .parity-pill.odd  { background: var(--amber-lt); color: var(--amber-dk); }
  .parity-pill.even { background: var(--sage-lt);  color: var(--sage); }

  /* 숫자 */
  .count-area {
    padding: 26px 16px 18px;
    text-align: center;
  }
  .count-lbl {
    font-size: 0.72rem; font-weight: 600;
    color: var(--ink3); letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .count-num {
    display: block;
    font-size: 6.5rem; font-weight: 800; line-height: 1;
    color: var(--ink); letter-spacing: -5px;
    transition: transform 0.1s, color 0.15s;
  }
  .count-num.bump { transform: scale(1.1); color: var(--amber); }
  .count-num.dip  { transform: scale(0.93); color: var(--rose); }

  /* 목표 */
  .goal-area { padding: 0 16px 16px; }
  .goal-top {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .goal-lbl { font-size: 0.78rem; font-weight: 500; color: var(--ink3); }
  .goal-inp {
    width: 68px; padding: 5px 8px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Pretendard', sans-serif;
    font-size: 0.85rem; font-weight: 600; color: var(--ink);
    background: var(--bg); outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .goal-inp:focus { border-color: var(--amber); }
  .goal-pct { margin-left: auto; font-size: 0.88rem; font-weight: 700; color: var(--amber); }

  .bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 99px; width: 0%;
    background: linear-gradient(90deg, var(--amber), #E8A878);
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bar-fill.done { background: linear-gradient(90deg, var(--sage), #8EC494); }

  /* 버튼 */
  .btn-grid {
    padding: 0 14px 16px;
    display: grid;
    grid-template-columns: 54px 1fr 54px;
    gap: 10px;
  }
  .btn-side {
    height: 62px; border-radius: 13px;
    background: var(--bg); border: 1.5px solid var(--border);
    font-size: 1.4rem; color: var(--ink3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s;
  }
  .btn-side:hover { border-color: var(--amber); color: var(--amber); }
  .btn-side:active { transform: scale(0.92); }

  .btn-main {
    height: 62px; border-radius: 13px;
    background: var(--amber); border: none; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1px;
    box-shadow: 0 3px 12px rgba(200,132,90,0.32);
    transition: all 0.12s; user-select: none;
  }
  .btn-main:active { transform: scale(0.97); box-shadow: 0 1px 5px rgba(200,132,90,0.2); }
  .btn-main-t { font-size: 1rem; font-weight: 800; color: #fff; }
  .btn-main-s { font-size: 0.62rem; font-weight: 500; color: rgba(255,255,255,0.75); letter-spacing: 0.8px; }

  /* 메모 */
  .memo-lbl {
    padding: 12px 16px 8px;
    font-size: 0.72rem; font-weight: 600;
    color: var(--ink3); letter-spacing: 0.8px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .memo-inp {
    width: 100%; padding: 10px 16px;
    font-family: 'Pretendard', sans-serif;
    font-size: 0.88rem; color: var(--ink);
    background: none; border: none; outline: none;
    resize: none; line-height: 1.7;
  }
  .memo-inp::placeholder { color: var(--ink4); }

  /* 히스토리 */
  .hist-lbl {
    padding: 12px 16px;
    font-size: 0.72rem; font-weight: 600;
    color: var(--ink3); letter-spacing: 0.8px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .hist-empty {
    padding: 20px 16px;
    font-size: 0.82rem; color: var(--ink4);
    text-align: center; line-height: 1.8;
  }
  .hist-item {
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    animation: popIn 0.18s ease;
  }
  .hist-item:last-child { border-bottom: none; }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hist-ico {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; flex-shrink: 0;
  }
  .hist-ico.up   { background: var(--amber-lt); color: var(--amber-dk); }
  .hist-ico.down { background: var(--rose-lt);  color: var(--rose); }
  .hist-row { font-size: 0.9rem; font-weight: 700; color: var(--ink); }
  .hist-pill {
    font-size: 0.65rem; font-weight: 600;
    padding: 2px 7px; border-radius: 99px; margin-left: 6px;
  }
  .hist-pill.odd  { background: var(--amber-lt); color: var(--amber-dk); }
  .hist-pill.even { background: var(--sage-lt);  color: var(--sage); }
  .hist-time {
    margin-left: auto; font-size: 0.7rem; color: var(--ink4);
    white-space: nowrap; flex-shrink: 0;
  }

  /* 완료 오버레이 */
  .done-ov {
    display: none; position: fixed; inset: 0;
    background: rgba(250,247,243,0.96);
    z-index: 100; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    animation: fadeIn 0.25s ease;
  }
  .done-ov.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .done-emoji { font-size: 5rem; animation: bob 0.7s ease-in-out infinite alternate; }
  @keyframes bob { to { transform: translateY(-12px); } }
  .done-title { font-size: 1.7rem; font-weight: 800; color: var(--amber); }
  .done-desc  { font-size: 0.9rem; color: var(--ink3); text-align: center; }
  .done-btn {
    margin-top: 6px; padding: 14px 40px;
    background: var(--amber); border: none; border-radius: 99px;
    font-family: 'Pretendard', sans-serif;
    font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer;
    box-shadow: 0 3px 14px rgba(200,132,90,0.32);
  }

  /* 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(42,32,24,0.45);
    z-index: 200; align-items: flex-end; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.26s cubic-bezier(0.34, 1.3, 0.64, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
  .modal-inp {
    width: 100%; padding: 13px 15px;
    border: 1.5px solid var(--border); border-radius: 11px;
    font-family: 'Pretendard', sans-serif; font-size: 1rem; color: var(--ink);
    outline: none; margin-bottom: 12px; transition: border-color 0.2s;
  }
  .modal-inp:focus { border-color: var(--amber); }
  .modal-ok {
    width: 100%; padding: 15px;
    background: var(--amber); border: none; border-radius: 11px;
    font-family: 'Pretendard', sans-serif;
    font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer;
  }
  .modal-no {
    width: 100%; padding: 13px; margin-top: 8px;
    background: none; border: 1.5px solid var(--border); border-radius: 11px;
    font-family: 'Pretendard', sans-serif; font-size: 0.95rem;
    font-weight: 500; color: var(--ink3); cursor: pointer;
  }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--ink); color: #fff;
    padding: 10px 20px; border-radius: 99px;
    font-size: 0.84rem; font-weight: 500;
    transition: transform 0.28s cubic-bezier(0.34, 1.4, 0.64, 1);
    z-index: 999; white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.26s ease; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">🧶</div>
  <span class="logo-text">단수 카운터</span>
</div>

<div class="tabs-row" id="tabsRow"></div>

<div class="main">
  <div class="card" id="mainCard">
    <div class="name-row">
      <input class="name-inp" id="nameInp" type="text" maxlength="20"
             placeholder="프로젝트 이름" oninput="onName()" />
      <span class="parity-pill odd" id="parityPill">홀수단</span>
    </div>
    <div class="count-area">
      <div class="count-lbl">현재 단수</div>
      <span class="count-num" id="countNum">0</span>
    </div>
    <div class="goal-area">
      <div class="goal-top">
        <span class="goal-lbl">목표 단수</span>
        <input class="goal-inp" id="goalInp" type="number" min="0"
               placeholder="—" oninput="onGoal()" />
        <span class="goal-pct" id="goalPct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
    <div class="btn-grid">
      <button class="btn-side" onclick="dec()">−</button>
      <button class="btn-main" onclick="inc()">
        <span class="btn-main-t">단수 +1</span>
        <span class="btn-main-s">TAP TO COUNT</span>
      </button>
      <button class="btn-side" onclick="doReset()">↺</button>
    </div>
  </div>

  <div class="card">
    <div class="memo-lbl">📝 메모</div>
    <textarea class="memo-inp" id="memoInp" rows="2"
              placeholder="짝수단은 누르지 않음, 6단마다 무늬 확인…"
              oninput="onMemo()"></textarea>
  </div>

  <div class="card">
    <div class="hist-lbl">최근 기록</div>
    <div id="histList"></div>
  </div>
</div>

<!-- 완료 -->
<div class="done-ov" id="doneOv">
  <div class="done-emoji">🎉</div>
  <div class="done-title">목표 달성!</div>
  <div class="done-desc" id="doneDesc"></div>
  <button class="done-btn" onclick="closeDone()">계속 뜨기</button>
</div>

<!-- 추가 모달 -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title">새 프로젝트 추가</div>
    <input class="modal-inp" id="newInp" placeholder="프로젝트 이름" maxlength="20" />
    <button class="modal-ok" onclick="confirmAdd()">추가하기</button>
    <button class="modal-no" onclick="closeModal()">취소</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'knit_rc_v4';
let S = { projects: [], active: 0 };

function mkP(name) {
  return { name, count: 0, goal: 0, memo: '', history: [] };
}

// ── 초기화 ──
window.addEventListener('load', () => {
  try { const r = localStorage.getItem(KEY); if (r) S = JSON.parse(r); } catch(e) {}
  if (!S.projects.length) S.projects.push(mkP('내 첫 작품'));
  if (S.active >= S.projects.length) S.active = 0;
  save(); renderAll();
});

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {}
}

function cur() { return S.projects[S.active]; }

// ── 카운터 ──
function inc() {
  const p = cur(); p.count++;
  pushH(p, 'up'); save(); anim('bump'); buzz([30]); renderCard(); renderHist();
  if (p.goal > 0 && p.count === p.goal) setTimeout(showDone, 300);
}

function dec() {
  const p = cur();
  if (p.count <= 0) {
    document.getElementById('mainCard').classList.add('shake');
    setTimeout(() => document.getElementById('mainCard').classList.remove('shake'), 280);
    toast('이미 0단이에요!'); return;
  }
  p.count--; pushH(p, 'down'); save(); anim('dip'); buzz([15]); renderCard(); renderHist();
}

function doReset() {
  const p = cur(); if (p.count === 0) return;
  if (!confirm(`"${p.name}"의 단수를 0으로 초기화할까요?`)) return;
  p.count = 0; p.history = []; save(); renderCard(); renderHist(); toast('↺ 초기화됐어요');
}

function pushH(p, dir) {
  const n = new Date();
  const date = `${n.getMonth()+1}/${n.getDate()}`;
  const time = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  p.history.unshift({ row: p.count, dir, date, time });
  if (p.history.length > 20) p.history.pop();
}

// ── 입력 ──
function onName() { cur().name = document.getElementById('nameInp').value || '새 프로젝트'; save(); renderTabs(); }
function onGoal() { cur().goal = parseInt(document.getElementById('goalInp').value) || 0; save(); renderProgress(); }
function onMemo() { cur().memo = document.getElementById('memoInp').value; save(); }

// ── 프로젝트 ──
function switchP(i) { S.active = i; save(); renderAll(); }

function delP(i) {
  if (S.projects.length <= 1) { toast('마지막 프로젝트는 삭제할 수 없어요'); return; }
  if (!confirm(`"${S.projects[i].name}"을 삭제할까요?`)) return;
  S.projects.splice(i, 1);
  if (S.active >= S.projects.length) S.active = S.projects.length - 1;
  save(); renderAll();
}

function openAdd() {
  document.getElementById('newInp').value = '';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('newInp').focus(), 100);
}

function confirmAdd() {
  const name = document.getElementById('newInp').value.trim() || '새 프로젝트';
  S.projects.push(mkP(name));
  S.active = S.projects.length - 1;
  save(); closeModal(); renderAll();
  toast('🧶 ' + name + ' 추가됐어요!');
}

function closeModal() { document.getElementById('addModal').classList.remove('show'); }

// ── 렌더 ──
function renderAll() { renderTabs(); renderCard(); renderHist(); }

function renderTabs() {
  // 탭 목록 + 추가 버튼을 한 번에 렌더링 (중복 방지)
  document.getElementById('tabsRow').innerHTML =
    S.projects.map((p, i) => `
      <div class="tab ${i === S.active ? 'active' : ''}" onclick="switchP(${i})">
        ${esc(p.name)}
        <span class="tab-x" onclick="event.stopPropagation();delP(${i})">✕</span>
      </div>`
    ).join('') +
    `<button class="btn-add-tab" onclick="openAdd()" title="새 프로젝트">＋</button>`;
}

function renderCard() {
  const p = cur();
  document.getElementById('nameInp').value = p.name;
  document.getElementById('countNum').textContent = p.count;
  document.getElementById('goalInp').value = p.goal || '';
  document.getElementById('memoInp').value = p.memo || '';
  const pill = document.getElementById('parityPill');
  const isOdd = p.count % 2 !== 0;
  pill.textContent = isOdd ? '홀수단' : '짝수단';
  pill.className = 'parity-pill ' + (isOdd ? 'odd' : 'even');
  renderProgress();
}

function renderProgress() {
  const p = cur();
  const pct = p.goal > 0 ? Math.min(100, Math.round(p.count / p.goal * 100)) : 0;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barFill').classList.toggle('done', pct >= 100);
  document.getElementById('goalPct').textContent = p.goal > 0 ? pct + '%' : '—';
}

function renderHist() {
  const p = cur();
  const el = document.getElementById('histList');
  if (!p.history.length) {
    el.innerHTML = '<div class="hist-empty">아직 기록이 없어요.<br>단수 +1을 눌러보세요! 🧶</div>';
    return;
  }
  el.innerHTML = p.history.map(h => {
    const odd = h.row % 2 !== 0;
    return `
      <div class="hist-item">
        <div class="hist-ico ${h.dir}">${h.dir === 'up' ? '▲' : '▼'}</div>
        <span class="hist-row">${h.row}단</span>
        <span class="hist-pill ${odd ? 'odd' : 'even'}">${odd ? '홀수단' : '짝수단'}</span>
        <span class="hist-time">${h.date} ${h.time}</span>
      </div>`;
  }).join('');
}

// ── 완료 ──
function showDone() {
  const p = cur();
  document.getElementById('doneDesc').textContent = `"${p.name}" — ${p.count}단 완성! 🎊`;
  document.getElementById('doneOv').classList.add('show');
  buzz([100, 50, 100, 50, 200]);
}
function closeDone() { document.getElementById('doneOv').classList.remove('show'); }

// ── 유틸 ──
function anim(cls) {
  const el = document.getElementById('countNum');
  el.classList.remove('bump','dip'); void el.offsetWidth;
  el.classList.add(cls); setTimeout(() => el.classList.remove(cls), 200);
}
function buzz(p) { try { if (navigator.vibrate) navigator.vibrate(p); } catch(e) {} }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2500);
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 키보드
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === ' ' || e.key === 'ArrowUp')  { e.preventDefault(); inc(); }
  if (e.key === 'ArrowDown')                  { e.preventDefault(); dec(); }
});

// 모달
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('newInp').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAdd();
  if (e.key === 'Escape') closeModal();
});
</script>
