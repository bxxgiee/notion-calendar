<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧶 단수 카운터</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nanum+Myeongjo:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1A1612;
    --surface:  #242018;
    --card:     #2E2820;
    --border:   #3D3428;
    --amber:    #D4956A;
    --amber2:   #E8B48A;
    --sage:     #7A9E7E;
    --rose:     #C4796A;
    --cream:    #F0E6D2;
    --mid:      #8A7A68;
    --dim:      #554A3C;
    --shadow:   rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(212,149,106,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(122,158,126,0.06) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Nanum Myeongjo', serif;
    color: var(--cream);
    padding: 0 0 80px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { font-size: 1.2rem; }

  .header-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--mid);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .header-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* ── PROJECT TABS ── */
  .tabs-wrap {
    padding: 16px 20px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.82rem;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
  }

  .tab.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    font-weight: 700;
  }

  .tab .del-tab {
    display: none;
    position: absolute;
    top: -6px; right: -6px;
    width: 16px; height: 16px;
    background: var(--rose);
    border-radius: 50%;
    font-size: 0.6rem;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: pointer;
  }

  .tab:hover .del-tab { display: flex; }

  .tab-add {
    flex-shrink: 0;
    padding: 8px 14px;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 20px;
    color: var(--dim);
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
  }

  .tab-add:hover { border-color: var(--amber); color: var(--amber); }

  /* ── MAIN COUNTER CARD ── */
  .counter-card {
    margin: 20px 20px 0;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px var(--shadow);
  }

  /* 프로젝트 이름 */
  .project-name-wrap {
    padding: 20px 24px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .project-name {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--cream);
    background: none;
    border: none;
    outline: none;
    flex: 1;
    cursor: text;
  }

  .project-name::placeholder { color: var(--dim); }

  .parity-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    transition: all 0.3s;
  }

  .parity-badge.odd  { background: rgba(212,149,106,0.15); color: var(--amber); border: 1px solid rgba(212,149,106,0.3); }
  .parity-badge.even { background: rgba(122,158,126,0.15); color: var(--sage);  border: 1px solid rgba(122,158,126,0.3); }

  /* 큰 숫자 */
  .count-display {
    text-align: center;
    padding: 32px 24px 20px;
    position: relative;
  }

  .count-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .count-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 8rem;
    line-height: 1;
    color: var(--cream);
    transition: transform 0.08s ease, color 0.15s;
    display: block;
    letter-spacing: 4px;
  }

  .count-number.bump {
    transform: scale(1.08);
    color: var(--amber2);
  }

  .count-number.down {
    transform: scale(0.95);
    color: var(--rose);
  }

  /* 목표 진행률 */
  .goal-section {
    padding: 0 24px 20px;
  }

  .goal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .goal-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--mid);
    white-space: nowrap;
  }

  .goal-input {
    width: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--cream);
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  .goal-input:focus { border-color: var(--amber); }

  .goal-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--amber);
    margin-left: auto;
    letter-spacing: 1px;
  }

  .progress-track {
    height: 6px;
    background: var(--surface);
    border-radius: 100px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--amber2));
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .progress-fill.done {
    background: linear-gradient(90deg, var(--sage), #A8D4AC);
  }

  /* 메인 버튼들 */
  .btn-row-main {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 12px;
    padding: 0 20px 20px;
  }

  .btn-side {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--mid);
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 18px 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .btn-side:hover { border-color: var(--amber); color: var(--amber); }
  .btn-side:active { transform: scale(0.94); }

  .btn-main {
    background: var(--amber);
    border: none;
    border-radius: 16px;
    color: var(--bg);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    cursor: pointer;
    padding: 22px 0;
    transition: all 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    user-select: none;
    box-shadow: 0 4px 20px rgba(212,149,106,0.35);
    position: relative;
    overflow: hidden;
  }

  .btn-main::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-main:active::after { opacity: 1; }
  .btn-main:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(212,149,106,0.25); }

  .btn-main-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* 메모 */
  .memo-section {
    margin: 0 20px 0;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .memo-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .memo-input {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.85rem;
    color: var(--cream);
    resize: none;
    line-height: 1.6;
    min-height: 48px;
  }

  .memo-input::placeholder { color: var(--dim); }

  /* 히스토리 */
  .history-section {
    margin: 16px 20px 0;
  }

  .history-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.8rem;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .history-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .history-dot.up   { background: var(--amber); }
  .history-dot.down { background: var(--rose); }

  .history-row {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--cream);
    letter-spacing: 1px;
  }

  .history-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--dim);
    margin-left: auto;
  }

  /* 알림 토스트 */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--amber);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 100px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(212,149,106,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 완료 오버레이 */
  .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,18,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.3s ease;
  }

  .done-overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .done-emoji {
    font-size: 5rem;
    animation: bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }

  .done-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--amber);
    letter-spacing: 3px;
    text-align: center;
  }

  .done-sub {
    font-size: 0.9rem;
    color: var(--mid);
    text-align: center;
  }

  .done-close {
    margin-top: 8px;
    background: var(--amber);
    border: none;
    border-radius: 100px;
    color: var(--bg);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    padding: 14px 40px;
    cursor: pointer;
  }

  /* 모달 */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-bg.show { display: flex; }

  .modal {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--amber);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .modal-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem;
    color: var(--cream);
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--amber); }

  .modal-btn {
    width: 100%;
    background: var(--amber);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-btn:active { transform: scale(0.98); }

  .modal-cancel {
    width: 100%;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.9rem;
    color: var(--mid);
    cursor: pointer;
    margin-top: 8px;
  }

  /* 진동 애니메이션 */
  @keyframes vibrate {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-4px); }
    40%      { transform: translateX(4px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }

  .vibrate { animation: vibrate 0.3s ease; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo"><span>🧶</span> ROW COUNTER</div>
  <button class="header-btn" onclick="openAddProject()">+ 새 프로젝트</button>
</div>

<!-- TABS -->
<div class="tabs-wrap" id="tabsWrap"></div>

<!-- COUNTER CARD -->
<div class="counter-card" id="counterCard">

  <!-- 프로젝트 이름 -->
  <div class="project-name-wrap">
    <input class="project-name" id="projectName" type="text" placeholder="프로젝트 이름..." oninput="saveProject()" />
    <div class="parity-badge odd" id="parityBadge">홀수단</div>
  </div>

  <!-- 숫자 -->
  <div class="count-display">
    <div class="count-label">현재 단수</div>
    <span class="count-number" id="countNumber">0</span>
  </div>

  <!-- 목표 진행률 -->
  <div class="goal-section">
    <div class="goal-row">
      <span class="goal-label">목표 단수</span>
      <input class="goal-input" id="goalInput" type="number" min="0" placeholder="—" oninput="updateGoal()" />
      <span class="goal-pct" id="goalPct">—</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="btn-row-main">
    <button class="btn-side" onclick="decrement()" title="-1">−</button>
    <button class="btn-main" id="mainBtn" onclick="increment()">
      단수 +1
      <span class="btn-main-sub">TAP TO COUNT</span>
    </button>
    <button class="btn-side" onclick="resetConfirm()" title="초기화">↺</button>
  </div>

</div>

<!-- 메모 -->
<div class="memo-section" style="margin-top:16px;">
  <div class="memo-label">📝 메모</div>
  <textarea class="memo-input" id="memoInput" placeholder="짝수단은 안 누름, 6단마다 무늬 확인..." rows="2" oninput="saveProject()"></textarea>
</div>

<!-- 히스토리 -->
<div class="history-section">
  <div class="history-title">최근 기록</div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- 완료 오버레이 -->
<div class="done-overlay" id="doneOverlay">
  <div class="done-emoji">🎉</div>
  <div class="done-text">목표 단수 달성!</div>
  <div class="done-sub" id="doneSubText"></div>
  <button class="done-close" onclick="closeDone()">계속 뜨기</button>
</div>

<!-- 새 프로젝트 모달 -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title">새 프로젝트 추가</div>
    <input class="modal-input" id="newProjectName" placeholder="프로젝트 이름 (예: 동글 파우치)" maxlength="20" />
    <button class="modal-btn" onclick="confirmAddProject()">추가하기</button>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let projects = [];
let activeIdx = 0;

const STORAGE_KEY = 'knitting_row_counter_v2';

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  load();
  if (projects.length === 0) {
    projects.push(newProject('내 첫 작품'));
    save();
  }
  render();
});

function newProject(name = '새 프로젝트') {
  return { name, count: 0, goal: 0, memo: '', history: [] };
}

// ══════════════════════════════════════════════════════
// COUNTER
// ══════════════════════════════════════════════════════
function increment() {
  const p = projects[activeIdx];
  p.count++;
  addHistory(p, 'up');
  saveProject();
  animateNumber('bump');
  vibrate([30]);
  updateUI();

  // 목표 달성 체크
  if (p.goal > 0 && p.count === p.goal) {
    setTimeout(() => showDone(p), 300);
  }
}

function decrement() {
  const p = projects[activeIdx];
  if (p.count <= 0) { shake(); return; }
  p.count--;
  addHistory(p, 'down');
  saveProject();
  animateNumber('down');
  vibrate([15]);
  updateUI();
}

function addHistory(p, dir) {
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  p.history.unshift({ row: p.count, dir, time });
  if (p.history.length > 10) p.history.pop();
}

function resetConfirm() {
  const p = projects[activeIdx];
  if (p.count === 0) return;
  if (confirm(`"${p.name}" 단수를 0으로 초기화할까요?`)) {
    p.count = 0;
    p.history = [];
    saveProject();
    updateUI();
    showToast('↺ 초기화됐어요');
  }
}

// ══════════════════════════════════════════════════════
// GOAL
// ══════════════════════════════════════════════════════
function updateGoal() {
  const val = parseInt(document.getElementById('goalInput').value) || 0;
  projects[activeIdx].goal = val;
  saveProject();
  updateProgress();
}

function updateProgress() {
  const p = projects[activeIdx];
  const pct = p.goal > 0 ? Math.min(100, Math.round(p.count / p.goal * 100)) : 0;
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('goalPct');
  fill.style.width = pct + '%';
  fill.classList.toggle('done', pct >= 100);
  pctEl.textContent = p.goal > 0 ? pct + '%' : '—';
}

// ══════════════════════════════════════════════════════
// PROJECT MANAGEMENT
// ══════════════════════════════════════════════════════
function saveProject() {
  const p = projects[activeIdx];
  p.name = document.getElementById('projectName').value || '새 프로젝트';
  p.memo = document.getElementById('memoInput').value;
  save();
  renderTabs();
}

function switchProject(idx) {
  activeIdx = idx;
  save();
  updateUI();
  renderTabs();
}

function deleteProject(idx, e) {
  e.stopPropagation();
  if (projects.length <= 1) { showToast('마지막 프로젝트는 삭제할 수 없어요'); return; }
  if (!confirm(`"${projects[idx].name}"을 삭제할까요?`)) return;
  projects.splice(idx, 1);
  if (activeIdx >= projects.length) activeIdx = projects.length - 1;
  save();
  render();
}

function openAddProject() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('newProjectName').focus(), 100);
}

function confirmAddProject() {
  const name = document.getElementById('newProjectName').value.trim() || '새 프로젝트';
  projects.push(newProject(name));
  activeIdx = projects.length - 1;
  save();
  closeModal();
  render();
  showToast('🧶 ' + name + ' 추가됐어요!');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  renderTabs();
  updateUI();
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = projects.map((p, i) => `
    <div class="tab ${i === activeIdx ? 'active' : ''}" onclick="switchProject(${i})">
      ${p.name}
      <span class="del-tab" onclick="deleteProject(${i}, event)">✕</span>
    </div>
  `).join('') + `<button class="tab-add" onclick="openAddProject()">+</button>`;
}

function updateUI() {
  const p = projects[activeIdx];
  document.getElementById('projectName').value = p.name;
  document.getElementById('countNumber').textContent = p.count;
  document.getElementById('goalInput').value = p.goal || '';
  document.getElementById('memoInput').value = p.memo || '';

  // 홀짝 배지
  const badge = document.getElementById('parityBadge');
  if (p.count % 2 === 0) {
    badge.textContent = '짝수단';
    badge.className = 'parity-badge even';
  } else {
    badge.textContent = '홀수단';
    badge.className = 'parity-badge odd';
  }

  updateProgress();
  renderHistory();
}

function renderHistory() {
  const p = projects[activeIdx];
  const list = document.getElementById('historyList');
  if (!p.history.length) {
    list.innerHTML = '<div style="font-size:0.78rem;color:var(--dim);padding:10px 4px;">아직 기록이 없어요. 단수 +1을 눌러보세요!</div>';
    return;
  }
  list.innerHTML = p.history.map(h => `
    <div class="history-item">
      <span class="history-dot ${h.dir}"></span>
      <span class="history-row">${h.dir === 'up' ? '▲' : '▼'} ${h.row}단</span>
      <span class="history-time">${h.time}</span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════════════
// ANIMATIONS & FEEDBACK
// ══════════════════════════════════════════════════════
function animateNumber(type) {
  const el = document.getElementById('countNumber');
  el.classList.remove('bump', 'down');
  void el.offsetWidth;
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), 200);
}

function shake() {
  const el = document.getElementById('counterCard');
  el.classList.add('vibrate');
  setTimeout(() => el.classList.remove('vibrate'), 300);
  showToast('이미 0단이에요!');
}

function vibrate(pattern) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

function showDone(p) {
  document.getElementById('doneSubText').textContent = `"${p.name}" — ${p.count}단 완성! 🎊`;
  document.getElementById('doneOverlay').classList.add('show');
  vibrate([100, 50, 100, 50, 200]);
}

function closeDone() {
  document.getElementById('doneOverlay').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, activeIdx }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    projects  = data.projects  || [];
    activeIdx = data.activeIdx || 0;
    if (activeIdx >= projects.length) activeIdx = 0;
  } catch(e) {
    projects = [];
  }
}

// 엔터로 프로젝트 추가
document.getElementById('newProjectName')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddProject();
  if (e.key === 'Escape') closeModal();
});

// 모달 배경 클릭 닫기
document.getElementById('addModal')?.addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// 키보드 단축키 (노션 외부에서 열 때)
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); increment(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); decrement(); }
});
</script>
</body>
</html>
