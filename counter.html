<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>🧶 단수 카운터</title>
<!-- 프리텐다드 웹 폰트 로드 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    /* 화사한 라이트 테마 컬러 팔레트 */
    --bg-outside: #E9ECEF;
    --bg-main: #F4F6F8;
    --surface: #FFFFFF;
    --border: #EDF0F5;
    
    /* 텍스트 컬러 */
    --text-main: #1A1D20;
    --text-sub: #6C757D;
    --text-dim: #ADB5BD;
    
    /* 포인트 컬러 */
    --primary: #FF748C;
    --primary-hover: #FF5A76;
    --primary-bg: #FFE5EA;
    --primary-gradient: linear-gradient(135deg, #FF748C 0%, #FFA8B5 100%);
    
    --secondary: #38BDF8;
    --secondary-bg: #E0F2FE;
    
    --success: #34D399;
    --success-gradient: linear-gradient(135deg, #34D399 0%, #6EE7B7 100%);
    
    /* 그림자 잘림 방지를 위해 사이즈 축소 및 조정 */
    --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.04);
    --shadow-primary: 0 6px 16px rgba(255, 116, 140, 0.2);
    
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { background-color: var(--bg-outside); }
  
  body {
    max-width: 480px; 
    margin: 0 auto;
    background-color: var(--bg-main);
    min-height: 100vh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    color: var(--text-main);
    padding: 0 0 100px;
    position: relative;
    /* body 전체 그림자는 제거하여 화면 밖 잘림 방지 */
  }

  /* --- 헤더 --- */
  .header {
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-btn {
    background: var(--surface);
    border: none;
    box-shadow: var(--shadow-sm);
    color: var(--primary);
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-btn:active { transform: scale(0.95); }

  /* --- 탭 --- */
  .tabs-wrap {
    padding: 4px 20px 8px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    user-select: none;
    box-shadow: var(--shadow-sm);
  }
  .tab.active { 
    background: var(--primary); 
    color: white; 
    box-shadow: var(--shadow-primary);
  }

  .tab-x {
    display: none;
    position: absolute;
    top: -6px; right: -6px;
    width: 22px; height: 22px;
    background: var(--text-main);
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: bold;
    line-height: 22px;
    text-align: center;
    color: white;
    cursor: pointer;
    z-index: 10;
  }
  .tab:hover .tab-x { display: block; }
  .tab.active:hover .tab-x { background: white; color: var(--primary); }

  .tab-add {
    flex-shrink: 0;
    padding: 10px 16px;
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: 100px;
    color: var(--text-dim);
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tab-add:hover { border-color: var(--primary); color: var(--primary); background: var(--surface); }

  /* --- 위젯 공통 스타일 --- */
  .widget {
    margin: 20px 20px 0;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: 24px;
    position: relative;
  }

  /* --- 카운터 위젯 --- */
  .project-name-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .project-name {
    font-family: inherit;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-main);
    background: none;
    border: none;
    outline: none;
    flex: 1;
    width: 100%;
  }
  .project-name::placeholder { color: var(--text-dim); }

  .parity-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 100px;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .parity-badge.odd  { background: var(--primary-bg); color: var(--primary); }
  .parity-badge.even { background: var(--secondary-bg); color: var(--secondary); }

  .count-display { text-align: center; padding: 20px 0 32px; }
  .count-label { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 4px; }
  .count-number {
    font-size: 6.5rem;
    font-weight: 900;
    line-height: 1;
    color: var(--text-main);
    transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.15s;
    display: block;
    letter-spacing: -2px;
  }
  .count-number.bump  { transform: scale(1.1); color: var(--primary); }
  .count-number.down  { transform: scale(0.9); color: var(--text-sub); }

  /* --- 목표 위젯 영역 --- */
  .goal-section { margin-bottom: 28px; }
  .goal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .goal-label { font-size: 0.85rem; font-weight: 700; color: var(--text-sub); }
  .goal-input {
    width: 60px; background: var(--bg-main); border: 2px solid transparent;
    border-radius: var(--radius-sm); padding: 6px; font-family: inherit;
    font-weight: 700; font-size: 0.9rem; color: var(--text-main); 
    outline: none; text-align: center; transition: all 0.2s;
  }
  .goal-input:focus { border-color: var(--primary); background: var(--surface); }
  .goal-input::placeholder { color: var(--text-dim); }
  .goal-pct { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-left: auto; }
  
  .progress-track { height: 10px; background: var(--bg-main); border-radius: 100px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--primary-gradient);
    border-radius: 100px; width: 0%; 
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
  }
  .progress-fill.done { background: var(--success-gradient); }

  /* --- 버튼 위젯 영역 --- */
  .btn-row-main { display: grid; grid-template-columns: 1fr 2.5fr 1fr; gap: 12px; }
  .btn-side {
    background: var(--bg-main); border: none; border-radius: var(--radius-md);
    color: var(--text-sub); font-size: 1.5rem; font-weight: 600;
    cursor: pointer; padding: 18px 0; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; user-select: none;
  }
  .btn-side:hover  { color: var(--text-main); background: #E2E8F0; }
  .btn-side:active { transform: scale(0.92); }

  .btn-main {
    background: var(--primary-gradient); border: none; border-radius: var(--radius-md);
    color: white; font-family: inherit; font-weight: 800;
    font-size: 1.6rem; cursor: pointer; padding: 20px 0;
    transition: all 0.15s; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    user-select: none; box-shadow: var(--shadow-primary);
  }
  .btn-main:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255, 116, 140, 0.2); }
  .btn-main-sub { font-size: 0.75rem; font-weight: 600; opacity: 0.85; letter-spacing: 0.5px; }

  /* --- 메모 위젯 --- */
  .memo-widget { padding: 20px 24px; border-radius: var(--radius-md); }
  .widget-title { font-size: 0.85rem; font-weight: 800; color: var(--text-sub); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .memo-input { 
    width: 100%; background: var(--bg-main); border: 2px solid transparent; 
    border-radius: var(--radius-sm); padding: 14px; outline: none; 
    font-family: inherit; font-size: 0.95rem; color: var(--text-main); 
    resize: none; line-height: 1.5; min-height: 80px; transition: all 0.2s;
  }
  .memo-input:focus { border-color: var(--primary); background: var(--surface); }
  .memo-input::placeholder { color: var(--text-dim); }

  /* --- 히스토리 위젯 --- */
  .history-widget { padding: 20px 24px; border-radius: var(--radius-md); }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { 
    display: flex; align-items: center; gap: 12px; 
    padding: 12px 16px; background: var(--bg-main); 
    border-radius: var(--radius-sm); 
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .history-dot.up { background: var(--primary); box-shadow: 0 0 8px rgba(255,116,140,0.5); }
  .history-dot.down { background: var(--text-dim); }
  .history-row { font-weight: 800; font-size: 1.05rem; color: var(--text-main); }
  
  /* 증가>홀수단/짝수단 표기 클래스 */
  .history-dir { font-size: 0.8rem; font-weight: 700; margin-left: 4px; }
  .history-dir.odd { color: var(--primary); }
  .history-dir.even { color: var(--secondary); }
  
  .history-time { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin-left: auto; }
  .history-empty { font-size: 0.9rem; color: var(--text-dim); text-align: center; padding: 20px 0; font-weight: 500; }

  /* --- 토스트 --- */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-main); color: white;
    padding: 14px 28px; border-radius: 100px;
    font-weight: 700; font-size: 0.95rem;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; white-space: nowrap; box-shadow: var(--shadow-md);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* --- 오버레이 & 모달 --- */
  .done-overlay { 
    display: none; position: fixed; inset: 0; 
    background: rgba(255,255,255,0.9); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; 
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .done-overlay.show { display: flex; }
  .done-emoji { font-size: 6rem; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-15px) scale(1.05); } }
  .done-text { font-size: 2.2rem; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
  .done-sub { font-size: 1rem; font-weight: 600; color: var(--text-sub); }
  .done-close { 
    margin-top: 20px; background: var(--primary-gradient); border: none; 
    border-radius: 100px; color: white; font-weight: 800; font-size: 1.1rem; 
    padding: 16px 48px; cursor: pointer; box-shadow: var(--shadow-primary);
  }

  /* 공통 모달 배경 */
  .modal-bg { 
    display: none; position: fixed; inset: 0; 
    background: rgba(0,0,0,0.4); backdrop-filter: blur(3px);
    z-index: 200; align-items: flex-end; justify-content: center; 
  }
  .modal-bg.show { display: flex; }
  .modal { 
    background: var(--surface); 
    border-radius: var(--radius-lg) var(--radius-lg) 0 0; 
    padding: 32px 24px 40px; width: 100%; max-width: 480px; 
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
    box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin-bottom: 24px; }
  .modal-input { 
    width: 100%; background: var(--bg-main); border: 2px solid transparent; 
    border-radius: var(--radius-sm); padding: 16px; font-family: inherit; 
    font-weight: 600; font-size: 1.05rem; color: var(--text-main); 
    outline: none; margin-bottom: 16px; transition: border-color 0.2s; 
  }
  .modal-input:focus { border-color: var(--primary); background: var(--surface); }
  .modal-btn { 
    width: 100%; background: var(--primary-gradient); border: none; 
    border-radius: var(--radius-sm); padding: 18px; font-weight: 800; 
    font-size: 1.1rem; color: white; cursor: pointer; box-shadow: var(--shadow-primary);
  }
  .modal-cancel { 
    width: 100%; background: none; border: none; 
    padding: 16px; font-weight: 700; font-size: 1rem; color: var(--text-sub); 
    cursor: pointer; margin-top: 8px; 
  }

  /* 확인용 (커스텀 confirm) 모달 디자인 추가 */
  .confirm-modal { text-align: center; }
  .confirm-msg { margin-bottom: 30px; font-size: 1.05rem; color: var(--text-sub); line-height: 1.5; word-break: keep-all; }
  .confirm-btn-wrap { display: flex; gap: 12px; }
  .confirm-btn-wrap button { margin: 0; flex: 1; }
  .btn-danger { background: var(--text-main); box-shadow: none; }

  @keyframes vibrate { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .vibrate { animation: vibrate 0.3s ease; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span>🧶</span> 단수 카운터</div>
  <button class="header-btn" onclick="openAddModal()">+ 새 프로젝트</button>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>

<!-- 메인 카운터 위젯 -->
<div class="widget" id="counterCard">
  <div class="project-name-wrap">
    <input class="project-name" id="projectName" type="text" placeholder="프로젝트 이름 입력..." oninput="saveCurrentProject()" />
    <div class="parity-badge odd" id="parityBadge">홀수단</div>
  </div>
  
  <div class="count-display">
    <div class="count-label">현재 단수</div>
    <span class="count-number" id="countNumber">0</span>
  </div>
  
  <div class="goal-section">
    <div class="goal-row">
      <span class="goal-label">🎯 목표 단수</span>
      <input class="goal-input" id="goalInput" type="number" min="0" placeholder="—" oninput="updateGoal()" />
      <span class="goal-pct" id="goalPct">—</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  
  <div class="btn-row-main">
    <button class="btn-side" onclick="decrement()">−</button>
    <button class="btn-main" onclick="increment()">
      단수 +1
      <span class="btn-main-sub">TAP TO COUNT</span>
    </button>
    <button class="btn-side" onclick="resetCount()">↺</button>
  </div>
</div>

<!-- 메모 위젯 -->
<div class="widget memo-widget">
  <div class="widget-title">📝 메모장</div>
  <textarea class="memo-input" id="memoInput" placeholder="여기에 뜨개질 팁이나 도안 정보를 메모해두세요!" oninput="saveCurrentProject()"></textarea>
</div>

<!-- 기록 위젯 -->
<div class="widget history-widget">
  <div class="widget-title">⏱ 최근 기록</div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- 달성 오버레이 -->
<div class="done-overlay" id="doneOverlay">
  <div class="done-emoji">🎉</div>
  <div class="done-text">목표 달성!</div>
  <div class="done-sub" id="doneSubText"></div>
  <button class="done-close" onclick="document.getElementById('doneOverlay').classList.remove('show')">계속 뜨기</button>
</div>

<!-- 새 프로젝트 모달 -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title">새 프로젝트 시작하기</div>
    <input class="modal-input" id="newProjectName" placeholder="프로젝트 이름 (예: 여름 네트백)" maxlength="20" />
    <button class="modal-btn" onclick="confirmAdd()">추가하기</button>
    <button class="modal-cancel" onclick="closeModal('addModal')">취소</button>
  </div>
</div>

<!-- 커스텀 Confirm 모달 (삭제/리셋 확인용) -->
<div class="modal-bg" id="confirmModal">
  <div class="modal confirm-modal">
    <div class="modal-title" id="confirmTitle">확인</div>
    <div class="confirm-msg" id="confirmMsg">정말 실행하시겠습니까?</div>
    <div class="confirm-btn-wrap">
      <button class="modal-cancel" onclick="closeModal('confirmModal')">취소</button>
      <button class="modal-btn btn-danger" id="confirmBtn">확인</button>
    </div>
  </div>
</div>

<!-- 토스트 알림 -->
<div class="toast" id="toast"></div>

<script>
let projects = [];
let activeIdx = 0;
const KEY = 'knitting_counter_v4_light_fixed';

// 커스텀 confirm용 콜백 함수 저장
let currentConfirmCallback = null;

window.addEventListener('load', () => {
  load();
  if (!projects.length) projects.push(makeProject('내 첫 작품'));
  save();
  renderAll();
});

function makeProject(name) {
  return { name, count: 0, goal: 0, memo: '', history: [] };
}

function cur() { return projects[activeIdx]; }

// ── CUSTOM CONFIRM (Alert/Confirm 대체) ────────────────
function openConfirm(title, msg, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  currentConfirmCallback = callback;
  document.getElementById('confirmModal').classList.add('show');
}

document.getElementById('confirmBtn').addEventListener('click', () => {
  if (currentConfirmCallback) currentConfirmCallback();
  closeModal('confirmModal');
});

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
  if(modalId === 'confirmModal') currentConfirmCallback = null;
}

// ── COUNTER ──────────────────────────────────────────
function increment() {
  const p = cur();
  p.count++;
  logHistory(p, 'up');
  save();
  animCount('bump');
  buzz([30]);
  updateUI();
  if (p.goal > 0 && p.count === p.goal) setTimeout(showDone, 300);
}

function decrement() {
  const p = cur();
  if (p.count <= 0) {
    document.getElementById('counterCard').classList.add('vibrate');
    setTimeout(() => document.getElementById('counterCard').classList.remove('vibrate'), 300);
    showToast('이미 0단이에요!');
    return;
  }
  p.count--;
  logHistory(p, 'down');
  save();
  animCount('down');
  buzz([15]);
  updateUI();
}

function resetCount() {
  if (cur().count === 0) return;
  // 기존 confirm() 대신 커스텀 모달 호출
  openConfirm('단수 초기화', `"${cur().name}"의 단수를 0으로 초기화할까요?`, () => {
    cur().count = 0;
    cur().history = [];
    save();
    updateUI();
    showToast('↺ 0단으로 초기화됐어요');
  });
}

function logHistory(p, dir) {
  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  // timestamp 저장 (날짜 구분을 위함)
  p.history.unshift({ row: p.count, dir, t, timestamp: now.getTime() });
  if (p.history.length > 5) p.history.pop();
}

// 스마트 날짜 포맷 함수 (오늘, 어제, M월 D일)
function formatHistoryTime(timestamp, oldTimeStr) {
  if (!timestamp) return oldTimeStr; // 과거 데이터 호환용
  
  const targetDate = new Date(timestamp);
  const now = new Date();
  
  const timeStr = `${String(targetDate.getHours()).padStart(2,'0')}:${String(targetDate.getMinutes()).padStart(2,'0')}`;
  
  // 날짜만 비교하기 위해 시/분/초 제거
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const targetStart = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate()).getTime();
  
  const diffDays = Math.round((todayStart - targetStart) / (1000 * 60 * 60 * 24));
  
  if (diffDays === 0) return `오늘 ${timeStr}`;
  if (diffDays === 1) return `어제 ${timeStr}`;
  return `${targetDate.getMonth() + 1}월 ${targetDate.getDate()}일 ${timeStr}`;
}

// ── GOAL ────────────────────────────────────────────
function updateGoal() {
  cur().goal = parseInt(document.getElementById('goalInput').value) || 0;
  save();
  updateProgress();
}

function updateProgress() {
  const p = cur();
  const pct = p.goal > 0 ? Math.min(100, Math.round(p.count / p.goal * 100)) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').classList.toggle('done', pct >= 100);
  document.getElementById('goalPct').textContent = p.goal > 0 ? pct + '%' : '—';
}

// ── PROJECTS ─────────────────────────────────────────
function saveCurrentProject() {
  cur().name = document.getElementById('projectName').value || '새 프로젝트';
  cur().memo = document.getElementById('memoInput').value;
  save();
  renderTabs();
}

function switchTo(idx) {
  activeIdx = idx;
  save();
  renderAll();
}

function deleteProject(idx) {
  if (projects.length <= 1) { showToast('마지막 프로젝트는 삭제할 수 없어요'); return; }
  
  // 기존 confirm() 대신 커스텀 모달 호출
  openConfirm('프로젝트 삭제', `"${projects[idx].name}"을 삭제할까요?`, () => {
    projects.splice(idx, 1);
    if (activeIdx >= projects.length) activeIdx = projects.length - 1;
    save();
    renderAll();
    showToast('삭제 완료');
  });
}

function openAddModal() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('newProjectName').focus(), 100);
}

function confirmAdd() {
  const name = document.getElementById('newProjectName').value.trim() || '새 프로젝트';
  projects.push(makeProject(name));
  activeIdx = projects.length - 1;
  save();
  closeModal('addModal');
  renderAll();
  showToast('🧶 ' + name + ' 시작!');
}

// ── RENDER ───────────────────────────────────────────
function renderAll() { renderTabs(); updateUI(); }

function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';

  projects.forEach((p, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === activeIdx ? ' active' : '');
    tab.textContent = p.name;
    tab.addEventListener('click', () => switchTo(i));

    const x = document.createElement('span');
    x.className = 'tab-x';
    x.textContent = '✕';
    x.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteProject(i);
    });

    tab.appendChild(x);
    wrap.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'tab-add';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', openAddModal);
  wrap.appendChild(addBtn);
}

function updateUI() {
  const p = cur();
  document.getElementById('projectName').value = p.name;
  document.getElementById('countNumber').textContent = p.count;
  document.getElementById('goalInput').value = p.goal || '';
  document.getElementById('memoInput').value = p.memo || '';

  const badge = document.getElementById('parityBadge');
  badge.textContent = p.count % 2 === 0 ? '짝수단' : '홀수단';
  badge.className   = 'parity-badge ' + (p.count % 2 === 0 ? 'even' : 'odd');

  updateProgress();
  renderHistory();
}

function renderHistory() {
  const p = cur();
  const list = document.getElementById('historyList');
  if (!p.history.length) {
    list.innerHTML = '<div class="history-empty">아직 기록이 없어요. 단수를 올려보세요!</div>';
    return;
  }
  
  list.innerHTML = p.history.map(h => {
    // 홀짝 텍스트 및 클래스 생성
    const isEven = (h.row % 2 === 0);
    const parityText = isEven ? '짝수단' : '홀수단';
    const parityClass = isEven ? 'even' : 'odd';
    
    // 스마트 날짜 파싱
    const displayTime = formatHistoryTime(h.timestamp, h.t);

    return `
      <div class="history-item">
        <span class="history-dot ${h.dir}"></span>
        <span class="history-row">${h.row}단</span>
        <span class="history-dir ${parityClass}">${parityText}</span>
        <span class="history-time">${displayTime}</span>
      </div>
    `;
  }).join('');
}

// ── FEEDBACK ─────────────────────────────────────────
function animCount(type) {
  const el = document.getElementById('countNumber');
  el.classList.remove('bump', 'down');
  void el.offsetWidth; // 트리거
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), 200);
}

function showDone() {
  document.getElementById('doneSubText').textContent = `"${cur().name}" — ${cur().count}단 완성!`;
  document.getElementById('doneOverlay').classList.add('show');
  buzz([100, 50, 100, 50, 200]);
}

function buzz(p) { if ('vibrate' in navigator) navigator.vibrate(p); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── STORAGE ──────────────────────────────────────────
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ projects, activeIdx })); } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (d) { projects = d.projects || []; activeIdx = d.activeIdx || 0; }
    if (activeIdx >= projects.length) activeIdx = 0;
  } catch(e) { projects = []; }
}

// ── KEYBOARD & EVENTS ────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === ' ' || e.key === 'ArrowUp')   { e.preventDefault(); increment(); }
  if (e.key === 'ArrowDown')                  { e.preventDefault(); decrement(); }
});

document.getElementById('newProjectName').addEventListener('keydown', e => {
  if (e.key === 'Enter')  confirmAdd();
  if (e.key === 'Escape') closeModal('addModal');
});

// 모달 바깥 배경 클릭 시 닫기
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', function(e) {
    if (e.target === this) closeModal(this.id);
  });
});
</script>
</body>
</html>
