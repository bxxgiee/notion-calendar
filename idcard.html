<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Notion ID Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #8e8e93;
            --accent: #000000;
            --border-color: #f2f2f7;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 카드 본체: 프리미엄 룩앤필 */
        .id-card {
            width: 440px;
            height: 260px;
            background: var(--card-bg);
            border-radius: 22px;
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            padding: 30px;
            position: relative;
            box-sizing: border-box;
            user-select: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .card-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .card-main {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .photo-wrap {
            width: 100px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            background: #f9f9fb;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .info-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .name-field {
            margin-bottom: 4px;
        }

        .name-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .detail-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-label {
            font-size: 8px;
            font-weight: 600;
            color: #c7c7cc;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 13px;
            font-weight: 500;
            color: #48484a;
        }

        /* 숨겨진 설정 트리거: 오른쪽 하단 40x40 영역 */
        #admin-trigger {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            cursor: default;
            z-index: 10;
        }

        /* 관리자 패널 */
        #admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 300px;
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            border: 1px solid #eee;
        }

        .admin-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
        }

        .input-box {
            padding: 12px;
            background: #f4f4f7;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .input-box:focus {
            background: #fff;
            border-color: #000;
        }

        .save-btn {
            background: #000;
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 10px;
            cursor: pointer;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 18px;
            cursor: pointer;
            color: #ccc;
        }

        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #000;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="id-card" id="main-card">
        <div class="card-header">
            <span class="card-label">Official Registry</span>
            <div id="sync-indicator" class="w-2 h-2 rounded-full bg-gray-100"></div>
        </div>

        <div class="card-main">
            <div class="photo-wrap">
                <img id="p-img" class="photo-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Profile">
            </div>

            <div class="info-wrap">
                <div class="name-field">
                    <div id="p-name" class="name-text">Loading..</div>
                </div>
                
                <div class="grid grid-cols-2 gap-y-3">
                    <div class="detail-row">
                        <span class="detail-label">University</span>
                        <span id="p-univ" class="detail-value">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Student ID</span>
                        <span id="p-sid" class="detail-value">-</span>
                    </div>
                    <div class="detail-row col-span-2">
                        <span class="detail-label">Department</span>
                        <span id="p-dept" class="detail-value">-</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading-line" class="loading-bar"></div>
        <!-- 숨겨진 트리거: 여기를 3번 연속 클릭하면 설정창이 뜸 -->
        <div id="admin-trigger"></div>
    </div>

    <!-- 설정 패널 -->
    <div id="admin-panel">
        <span class="close-btn" onclick="hideAdmin()">×</span>
        <div class="admin-title">Widget Settings</div>
        
        <div class="input-group">
            <label class="input-label">Notion API Key</label>
            <input type="password" id="n-key" class="input-box" placeholder="secret_...">
        </div>
        
        <div class="input-group">
            <label class="input-label">Database ID</label>
            <input type="text" id="n-db" class="input-box" placeholder="32 characters ID">
        </div>
        
        <button onclick="saveAndFetch()" class="save-btn">Save & Sync</button>
        <div id="admin-status" class="text-[10px] text-center mt-2 text-gray-400"></div>
    </div>

    <script>
        // 관리자 모드 진입 로직 (3번 클릭)
        let clickCount = 0;
        let clickTimer;
        document.getElementById('admin-trigger').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            if (clickCount === 3) {
                showAdmin();
                clickCount = 0;
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 500);
        });

        function showAdmin() { document.getElementById('admin-panel').style.display = 'flex'; }
        function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        async function saveAndFetch() {
            const token = document.getElementById('n-key').value;
            const dbId = document.getElementById('n-db').value;
            if (!token || !dbId) return;

            localStorage.setItem('n_token', token);
            localStorage.setItem('n_db', dbId);
            await syncNotion(token, dbId);
        }

        async function syncNotion(token, dbId) {
            const bar = document.getElementById('loading-line');
            const indicator = document.getElementById('sync-indicator');
            bar.style.width = '30%';
            
            const notionUrl = `https://api.notion.com/v1/databases/${dbId}/query`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(notionUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = JSON.parse((await response.json()).contents);
                const page = data.results[0];

                if (!page) throw new Error("No Data");

                const props = page.properties;
                
                // 판매용 고정 속성 이름
                const name = props['이름']?.title?.[0]?.plain_text || "User Name";
                const univ = props['대학']?.rich_text?.[0]?.plain_text || "University";
                const dept = props['학과']?.rich_text?.[0]?.plain_text || "Department";
                const sid = props['학번']?.rich_text?.[0]?.plain_text || "ID Number";
                
                let photoUrl = "https://via.placeholder.com/200x260?text=No+Photo";
                const imgProp = props['이미지']?.files?.[0];
                if (imgProp) photoUrl = imgProp.file?.url || imgProp.external?.url;

                // UI 반영
                document.getElementById('p-name').innerText = name;
                document.getElementById('p-univ').innerText = univ;
                document.getElementById('p-dept').innerText = dept;
                document.getElementById('p-sid').innerText = sid;
                document.getElementById('p-img').src = photoUrl;

                bar.style.width = '100%';
                indicator.className = "w-2 h-2 rounded-full bg-green-400";
                
                setTimeout(() => {
                    bar.style.width = '0%';
                    hideAdmin();
                }, 800);

            } catch (err) {
                indicator.className = "w-2 h-2 rounded-full bg-red-400";
                bar.style.width = '0%';
                console.error(err);
            }
        }

        window.onload = () => {
            const t = localStorage.getItem('n_token');
            const d = localStorage.getItem('n_db');
            if (t && d) {
                document.getElementById('n-key').value = t;
                document.getElementById('n-db').value = d;
                syncNotion(t, d);
            }
        };
    </script>
</body>
</html>
