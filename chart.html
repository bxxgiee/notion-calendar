<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 주식 대시보드 (Toss Style)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] },
          colors: {
            red: { 500: '#f04452', 50: '#fdf0f1' },
            blue: { 500: '#3182f6', 50: '#eef3fd' },
            gray: { 100: '#f2f4f6', 400: '#8b95a1', 800: '#333d4b', 900: '#191f28' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffff; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 0px; height: 0px; }
    
    .ratio-bar-blue { background-color: #3182f6; height: 4px; border-radius: 2px 0 0 2px; }
    .ratio-bar-red { background-color: #f04452; height: 4px; border-radius: 0 2px 2px 0; }
    
    /* 실제 가격 변동 시 깜빡임 애니메이션 */
    @keyframes flash-red {
      0% { background-color: rgba(240, 68, 82, 0.2); }
      100% { background-color: transparent; }
    }
    @keyframes flash-blue {
      0% { background-color: rgba(49, 130, 246, 0.2); }
      100% { background-color: transparent; }
    }
    .update-up { animation: flash-red 1s ease-out; }
    .update-down { animation: flash-blue 1s ease-out; }
    
    .text-flash-up { color: #f04452 !important; transition: color 0.1s; }
    .text-flash-down { color: #3182f6 !important; transition: color 0.1s; }
    
    .shimmer {
      background: #f6f7f8;
      background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
      background-repeat: no-repeat;
      background-size: 800px 100%; 
      animation-duration: 1s;
      animation-fill-mode: forwards; 
      animation-iteration-count: infinite;
      animation-name: placeholderShimmer;
      animation-timing-function: linear;
      border-radius: 4px;
    }
    @keyframes placeholderShimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }
  </style>
</head>
<body class="text-gray-900 p-4 max-w-5xl mx-auto">

  <!-- 헤더 & 상태창 -->
  <div class="mb-6 mt-2">
    <div class="flex items-center justify-between gap-4 text-xs font-bold text-gray-500 mb-5">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg">
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse" id="status-dot"></div>
        <span id="sync-status">실시간 시장 데이터 다이렉트 연결 중...</span>
      </div>
      <div id="last-update" class="text-gray-400 font-medium">업데이트 대기중...</div>
    </div>

    <!-- 상단 지수 카드 -->
    <div class="flex overflow-x-auto gap-4 pb-4 border-b border-gray-100">
      
      <!-- 달러 환율 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-2 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-sm">💵</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">달러 환율</div>
          <div class="flex items-baseline gap-1.5" id="idx-FX_IDC:USDKRW">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>

      <!-- 코스피 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-4 border-l border-gray-100 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-lg shadow-sm">🇰🇷</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">코스피 종합</div>
          <div class="flex items-baseline gap-1.5" id="idx-KRX:KOSPI">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>
      
      <!-- 나스닥 -->
      <div class="min-w-[180px] flex items-center gap-3 py-2 px-4 border-l border-gray-100 hover:bg-gray-50 rounded-xl transition cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-lg shadow-sm">🇺🇸</div>
        <div>
          <div class="text-[11px] font-bold text-gray-400 mb-0.5">나스닥 종합</div>
          <div class="flex items-baseline gap-1.5" id="idx-NASDAQ:IXIC">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price text-[15px] hidden">로딩중</span>
            <span class="text-[11px] font-bold change text-gray-400 hidden">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭 네비게이션 -->
  <div class="flex gap-6 mb-2 border-b border-gray-100">
    <div id="tab-kr" onclick="switchTab('kr')" class="pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition">국내 주식</div>
    <div id="tab-us" onclick="switchTab('us')" class="pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition">해외 주식</div>
  </div>

  <!-- 리스트 헤더 -->
  <div class="flex items-center px-2 py-3 text-[11px] text-gray-400 font-bold border-b border-gray-100 bg-white sticky top-0 z-10">
    <div class="w-10"></div>
    <div class="flex-grow min-w-[120px]">종목명</div>
    <div class="w-24 text-right">현재가</div>
    <div class="w-20 text-right">등락률</div>
    <div class="w-24 text-right hidden sm:block">거래량</div>
    <div class="w-24 text-right hidden md:block">매수·매도 비율 ⓘ</div>
  </div>

  <!-- 종목 리스트 영역 -->
  <div class="flex flex-col relative min-h-[400px]">
    <div id="stock-items" class="flex flex-col pb-10">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <script>
    // 현재 선택된 탭 상태
    let currentTab = 'kr';
    const latestDataCache = {};
    const prevPrices = {};

    // 표시할 종목 설정 (TradingView 다이렉트 티커)
    const STOCKS = [
      // 국내 주식
      { tvId: "KRX:005930", name: "삼성전자", logoColor: "#004098", logoInit: "삼", isUs: false, ratioBlue: 42, ratioRed: 58 },
      { tvId: "KRX:000660", name: "SK하이닉스", logoColor: "#e60012", logoInit: "S", isUs: false, ratioBlue: 41, ratioRed: 59 },
      { tvId: "KRX:005380", name: "현대차", logoColor: "#002c5f", logoInit: "현", isUs: false, ratioBlue: 55, ratioRed: 45 },
      { tvId: "KRX:035420", name: "NAVER", logoColor: "#00c73c", logoInit: "N", isUs: false, ratioBlue: 50, ratioRed: 50 },
      { tvId: "KRX:035720", name: "카카오", logoColor: "#fae100", logoInit: "카", isUs: false, ratioBlue: 65, ratioRed: 35, isDarkText: true },
      { tvId: "KRX:068270", name: "셀트리온", logoColor: "#1a2c5a", logoInit: "셀", isUs: false, ratioBlue: 48, ratioRed: 52 },
      { tvId: "KRX:000270", name: "기아", logoColor: "#05141f", logoInit: "기", isUs: false, ratioBlue: 40, ratioRed: 60 },
      { tvId: "KRX:105560", name: "KB금융", logoColor: "#ffcc00", logoInit: "K", isUs: false, ratioBlue: 52, ratioRed: 48, isDarkText: true },
      
      // 해외 주식 (미국)
      { tvId: "NASDAQ:AAPL", name: "애플", logoColor: "#000000", logoInit: "A", isUs: true, ratioBlue: 45, ratioRed: 55 },
      { tvId: "NASDAQ:TSLA", name: "테슬라", logoColor: "#e82127", logoInit: "T", isUs: true, ratioBlue: 30, ratioRed: 70 },
      { tvId: "NASDAQ:NVDA", name: "엔비디아", logoColor: "#76b900", logoInit: "N", isUs: true, ratioBlue: 20, ratioRed: 80 },
      { tvId: "NASDAQ:MSFT", name: "마이크로소프트", logoColor: "#00a4ef", logoInit: "M", isUs: true, ratioBlue: 40, ratioRed: 60 },
      { tvId: "NASDAQ:GOOGL", name: "구글 (Alphabet)", logoColor: "#4285F4", logoInit: "G", isUs: true, ratioBlue: 50, ratioRed: 50 },
      { tvId: "NASDAQ:AMZN", name: "아마존", logoColor: "#FF9900", logoInit: "A", isUs: true, ratioBlue: 48, ratioRed: 52, isDarkText: true },
      { tvId: "NASDAQ:META", name: "메타 (Meta)", logoColor: "#0668E1", logoInit: "M", isUs: true, ratioBlue: 45, ratioRed: 55 },
      { tvId: "NYSE:TSM", name: "TSMC", logoColor: "#C8102E", logoInit: "T", isUs: true, ratioBlue: 35, ratioRed: 65 }
    ];

    const INDICES = ["KRX:KOSPI", "NASDAQ:IXIC", "FX_IDC:USDKRW"]; // 다이렉트 티커

    const formatNum = (num, isUs = false) => {
      if (!num && num !== 0) return "-";
      if (!isUs) return Math.floor(num).toLocaleString('ko-KR'); 
      return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const formatVol = (num) => {
      if(!num) return "-";
      if(num >= 1000000) return (num/1000000).toFixed(1) + "M";
      if(num >= 10000) return (num/10000).toFixed(0) + "만";
      return num.toLocaleString('ko-KR');
    };

    // 1. 탭 전환 처리
    function switchTab(tab) {
      currentTab = tab;
      
      const tabKr = document.getElementById('tab-kr');
      const tabUs = document.getElementById('tab-us');
      
      if (tab === 'kr') {
        tabKr.className = "pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition";
        tabUs.className = "pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition";
      } else {
        tabUs.className = "pb-3 text-lg font-bold border-b-2 border-gray-900 text-gray-900 cursor-pointer transition";
        tabKr.className = "pb-3 text-lg font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-800 cursor-pointer transition";
      }
      
      renderListItems();
    }

    // 2. 종목 리스트 렌더링 (초기 로딩 스켈레톤 UI 포함)
    function renderListItems() {
      const container = document.getElementById('stock-items');
      container.innerHTML = ''; 
      
      const filteredStocks = STOCKS.filter(stock => currentTab === 'kr' ? !stock.isUs : stock.isUs);
      
      filteredStocks.forEach((stock) => {
        const row = document.createElement('div');
        row.className = 'flex items-center px-2 py-3.5 hover:bg-gray-50 rounded-[14px] transition duration-200 border-b border-gray-50 last:border-0 cursor-pointer group';
        // HTML id는 특수문자 제거
        const safeId = stock.tvId.replace(/[^a-zA-Z0-9]/g, '');
        row.id = `row-${safeId}`;
        
        const textColor = stock.isDarkText ? 'text-gray-900' : 'text-white';
        
        row.innerHTML = `
          <div class="w-10 flex justify-center text-gray-300 group-hover:text-red-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </div>
          <div class="flex-grow min-w-[120px] flex items-center gap-3">
            <div class="w-[34px] h-[34px] rounded-full flex items-center justify-center ${textColor} font-bold text-[13px] shadow-sm" style="background-color: ${stock.logoColor};">
              ${stock.logoInit}
            </div>
            <div class="font-bold text-gray-900 text-[15px] tracking-tight">${stock.name}</div>
          </div>
          <div class="w-24 text-right flex justify-end">
            <div class="h-5 w-16 shimmer price-placeholder"></div>
            <span class="font-bold text-gray-900 price-col text-[15px] tracking-tight hidden"></span>
          </div>
          <div class="w-20 flex justify-end change-container">
            <div class="h-5 w-12 shimmer price-placeholder"></div>
            <span class="change-col hidden"></span>
          </div>
          <div class="w-24 flex justify-end text-gray-500 font-medium text-[13px] hidden sm:flex">
             <div class="h-5 w-12 shimmer price-placeholder"></div>
             <span class="vol-col hidden"></span>
          </div>
          <div class="w-24 hidden md:flex items-center justify-end gap-2 pl-4 opacity-50 bar-container">
            <div class="flex-grow flex h-1 gap-[1px]">
              <div class="ratio-bar-blue" style="width: ${stock.ratioBlue}%;"></div>
              <div class="ratio-bar-red" style="width: ${stock.ratioRed}%;"></div>
            </div>
          </div>
        `;
        container.appendChild(row);

        // 캐시된 데이터가 있으면 즉시 반영
        if (latestDataCache[stock.tvId]) {
          updateRowUI(stock, latestDataCache[stock.tvId]);
        }
      });
    }

    // 3. UI 업데이트 (진짜 가격이 바뀌었을 때만 깜빡임)
    function updateRowUI(stockMeta, quoteData) {
      const safeId = stockMeta.tvId.replace(/[^a-zA-Z0-9]/g, '');
      const rowEl = document.getElementById(`row-${safeId}`);
      if (!rowEl) return;

      const price = quoteData[0]; // close
      const changePercent = quoteData[1]; // change %
      const volume = quoteData[2]; // volume

      const isUp = changePercent > 0;
      const isFlat = changePercent === 0;
      const colorClass = isUp ? 'text-red-500' : (isFlat ? 'text-gray-500' : 'text-blue-500');
      const bgClass = isUp ? 'bg-red-50' : (isFlat ? 'bg-gray-100' : 'bg-blue-50');
      const sign = isUp ? '+' : '';

      const prefix = stockMeta.isUs ? '$' : '';
      const suffix = stockMeta.isUs ? '' : '원';
      const priceStr = `${prefix}${formatNum(price, stockMeta.isUs)}${suffix}`;
      
      // 스켈레톤 UI 제거 및 실제 텍스트 노출
      rowEl.querySelectorAll('.price-placeholder').forEach(el => el.classList.add('hidden'));
      rowEl.querySelector('.price-col').classList.remove('hidden');
      rowEl.querySelector('.change-col').classList.remove('hidden');
      rowEl.querySelector('.vol-col').classList.remove('hidden');
      rowEl.querySelector('.bar-container').classList.remove('opacity-50');

      // 가격 변동 시에만 호가창 애니메이션 실행
      if (prevPrices[stockMeta.tvId] && prevPrices[stockMeta.tvId] !== price) {
        const animClass = price > prevPrices[stockMeta.tvId] ? 'update-up' : 'update-down';
        const textAnimClass = price > prevPrices[stockMeta.tvId] ? 'text-flash-up' : 'text-flash-down';
        
        rowEl.classList.remove('update-up', 'update-down');
        void rowEl.offsetWidth; 
        rowEl.classList.add(animClass);

        const priceCol = rowEl.querySelector('.price-col');
        priceCol.classList.add(textAnimClass);
        setTimeout(() => priceCol.classList.remove('text-flash-up', 'text-flash-down'), 300);
      }
      prevPrices[stockMeta.tvId] = price;

      rowEl.querySelector('.price-col').innerText = priceStr;
      rowEl.querySelector('.change-col').innerHTML = `<span class="${colorClass} ${bgClass} px-2 py-1 rounded-[6px] text-[13px] font-bold">${sign}${changePercent.toFixed(2)}%</span>`;
      rowEl.querySelector('.vol-col').innerText = formatVol(volume);
    }

    // 에러 UI 처리 함수
    function handleErrorState() {
      document.getElementById('sync-status').innerText = "통신 지연 (재시도 중)";
      document.getElementById('sync-status').classList.replace('text-gray-500', 'text-red-500');
      document.getElementById('status-dot').classList.replace('bg-green-500', 'bg-red-500');
    }

    // 4. [핵심] 트레이딩뷰 스캐너 API 다이렉트 호출 (CORS 우회 불필요!)
    async function fetchRealData() {
      // 시장별 티커 분류
      const tvMarkets = {
        korea: STOCKS.filter(s => !s.isUs).map(s => s.tvId).concat(["KRX:KOSPI"]),
        america: STOCKS.filter(s => s.isUs).map(s => s.tvId).concat(["NASDAQ:IXIC"]),
        forex: ["FX_IDC:USDKRW"]
      };

      try {
        const fetchPromises = Object.keys(tvMarkets).map(async (market) => {
          const url = `https://scanner.tradingview.com/${market}/scan`;
          const body = {
            symbols: { tickers: tvMarkets[market] },
            columns: ["close", "change", "volume"]
          };
          
          // 브라우저 직접 호출 (CORS 허용 서버)
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' }, // Preflight 방지용 꼼수
            body: JSON.stringify(body)
          });
          const json = await res.json();
          return json.data; 
        });

        // 3개 시장 데이터 한 번에 병렬 수신
        const resultsArray = await Promise.all(fetchPromises);
        const allResults = resultsArray.flat(); 

        if (!allResults || allResults.length === 0) throw new Error("No data");

        // 통신 성공 UI 업데이트
        const now = new Date();
        document.getElementById('last-update').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} 갱신`;
        document.getElementById('sync-status').innerText = "실시간 다이렉트 연동 중";
        document.getElementById('sync-status').classList.replace('text-red-500', 'text-gray-500');
        document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');

        allResults.forEach(item => {
          const symbol = item.s;
          const quoteData = item.d; // [price, change%, volume]
          latestDataCache[symbol] = quoteData;

          // 1. 지수 및 환율 업데이트
          if (INDICES.includes(symbol)) {
            const el = document.getElementById(`idx-${symbol}`);
            if(el) {
              const price = quoteData[0];
              const changePercent = quoteData[1];
              const isUp = changePercent > 0;
              const colorClass = isUp ? 'text-red-500' : (changePercent < 0 ? 'text-blue-500' : 'text-gray-500');
              const sign = isUp ? '+' : '';

              const isKrw = symbol === "FX_IDC:USDKRW";
              const priceFormat = isKrw ? formatNum(price, false) : formatNum(price, true);

              // 스켈레톤 끄기
              el.querySelector('.price-placeholder').classList.add('hidden');
              el.querySelector('.price').classList.remove('hidden', 'text-red-400');
              el.querySelector('.change').classList.remove('hidden');

              el.querySelector('.price').innerText = priceFormat;
              const changeEl = el.querySelector('.change');
              changeEl.innerText = `${sign}${changePercent.toFixed(2)}%`;
              changeEl.className = `text-[11px] font-bold change ${colorClass}`;
            }
            return;
          }

          // 2. 주식 리스트 업데이트
          const stockMeta = STOCKS.find(s => s.tvId === symbol);
          if (stockMeta) {
            updateRowUI(stockMeta, quoteData);
          }
        });

      } catch (e) {
        console.warn('API Fetch Failed:', e);
        handleErrorState();
      }
    }

    // 스크립트 실행 시작
    renderListItems();
    fetchRealData();
    
    // 다이렉트 연결이므로 10초마다 마음껏 긁어와도 절대 막히지 않습니다!
    setInterval(fetchRealData, 10000);

  </script>
</body>
</html>
