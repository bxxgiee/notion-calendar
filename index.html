<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Minimal Calendar with Mood</title>
    <!-- 귀엽고 둥글둥글한 폰트 적용 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        :root {
            /* 기본 색상 설정 */
            --bg-color: #A7C7E7; 
            --text-color: #FFFFFF;
            --today-bg: #FFFFFF;
            --today-text: #A7C7E7;
            --selected-border: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            background-color: transparent;
            color: var(--text-color);
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .calendar-box {
            width: 92%; /* 고정 너비 대신 비율로 설정 */
            max-width: 380px; /* 너무 커지는 것 방지 */
            padding: 8% 7% 6% 7%; /* 고정 px 대신 비율(%)로 여백 설정 */
            box-sizing: border-box;
            background-color: var(--bg-color);
            border-radius: 20px;
            user-select: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 헤더: 노션 임베드 크기에 따라 폰트 크기 반응 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7%;
        }

        .month-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #month-year {
            font-size: clamp(1.1rem, 5vw, 1.35rem); /* 창 크기에 따라 폰트 크기 자동 조절 */
            font-weight: 800;
            min-width: 80px;
            text-align: center;
            line-height: 1;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            cursor: pointer;
            width: clamp(24px, 8vw, 30px);
            height: clamp(24px, 8vw, 30px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }

        .today-btn {
            background-color: white;
            color: var(--bg-color);
            border: none;
            font-family: inherit;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            font-weight: 800;
            padding: 1.5% 4%;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .today-btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* 그리드 영역 */
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2%; /* 간격도 비율로 설정 */
            justify-items: center;
        }

        .day-name {
            font-size: clamp(0.6rem, 2.5vw, 0.75rem);
            font-weight: 800;
            margin-bottom: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .day-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* 가로세로 비율 1:1 유지 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .day {
            width: 90%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(0.85rem, 4vw, 1rem);
            font-weight: 700;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .day:hover { background: rgba(255, 255, 255, 0.2); }

        .day.today {
            background-color: white;
            color: var(--bg-color);
            font-weight: 900;
        }

        .day.selected {
            border: 2px dashed var(--selected-border);
        }

        .sticker-on-day {
            position: absolute;
            top: -5%;
            right: -5%;
            font-size: clamp(0.75rem, 3.5vw, 0.95rem);
            z-index: 5;
            pointer-events: none;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 하단 무드 섹션 */
        .mood-section {
            margin-top: 5%;
            padding-top: 5%;
            border-top: 1.5px dashed rgba(255, 255, 255, 0.3);
        }

        .mood-title {
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            font-weight: 400;
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 6px;
            padding-left: 2px;
        }

        .sticker-palette {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 10px;
            border-radius: 14px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
            scrollbar-width: none;
        }

        .sticker-palette::-webkit-scrollbar { display: none; }

        .sticker-item {
            font-size: clamp(1rem, 5vw, 1.3rem);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: clamp(28px, 9vw, 36px);
            height: clamp(28px, 9vw, 36px);
            min-width: clamp(28px, 9vw, 36px);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        .sticker-item:hover {
            transform: scale(1.2) translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .empty { pointer-events: none; opacity: 0; }
    </style>
</head>
<body>

    <div class="calendar-box">
        <div class="header">
            <div class="month-controls">
                <button id="prev-month" class="nav-btn">❮</button>
                <div id="month-year"></div>
                <button id="next-month" class="nav-btn">❯</button>
            </div>
            <button id="go-today" class="today-btn">today</button>
        </div>
        
        <div class="grid">
            <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
            <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
        </div>
        
        <div class="grid" id="calendar-days"></div>

        <div class="mood-section">
            <div class="mood-title">
                ☁️ <span id="selected-date-text">오늘</span>의 기분
            </div>
            <div class="sticker-palette" id="emoji-list"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const paramBg = urlParams.get('bg');
        if (paramBg) {
            document.documentElement.style.setProperty('--bg-color', '#' + paramBg);
            document.documentElement.style.setProperty('--today-text', '#' + paramBg);
        }

        const buyerCustomLink = urlParams.get('link');
        const finalLink = buyerCustomLink || "javascript:void(0);";

        let currentDisplayDate = new Date();
        let displayYear = currentDisplayDate.getFullYear();
        let displayMonth = currentDisplayDate.getMonth();
        let selectedDate = new Date();
        
        let stickers = {};

        const emojis = ['😊', '🥰', '🤩', '🥳', '😎', '🫠', '🥱', '😴', '😭', '🤒', '😡', '🙄', '🤔', '💖', '🔥', '💧', '✨', '☁️', '☀️', '🌈', '🌸', '🍀', '🧸', '🍰', '🐾', '🎀', '🍭', '🍓', '🍋', '🎨', '🌙', '🧁', '🍕', '☕', '🌷', '🐥', '🐱', '🐶', '👻', '🎈', '✅', '🧡', '🥑'];

        function initEmojiPalette() {
            const palette = document.getElementById('emoji-list');
            palette.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    palette.scrollLeft += e.deltaY;
                }
            });

            emojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'sticker-item';
                item.innerText = emoji;
                item.onclick = () => addSticker(emoji);
                palette.appendChild(item);
            });
        }

        function renderCalendar(year, month) {
            const now = new Date();
            const realYear = now.getFullYear();
            const realMonth = now.getMonth();
            const realToday = now.getDate();

            document.getElementById('month-year').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;
            updateSelectedDateText();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysContainer = document.getElementById('calendar-days');
            
            daysContainer.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-wrapper empty';
                daysContainer.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${year}-${month + 1}-${i}`;
                const wrapper = document.createElement('div');
                wrapper.className = 'day-wrapper';

                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = i;

                if (year === realYear && month === realMonth && i === realToday) {
                    dayEl.classList.add('today');
                }

                if (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && i === selectedDate.getDate()) {
                    dayEl.classList.add('selected');
                }

                if (stickers[dateKey]) {
                    const stickerSpan = document.createElement('span');
                    stickerSpan.className = 'sticker-on-day';
                    stickerSpan.innerText = stickers[dateKey];
                    wrapper.appendChild(stickerSpan);
                }

                dayEl.onclick = () => {
                    selectedDate = new Date(year, month, i);
                    renderCalendar(year, month);
                };

                if (buyerCustomLink) {
                    dayEl.ondblclick = () => window.open(finalLink, '_top');
                }

                wrapper.appendChild(dayEl);
                daysContainer.appendChild(wrapper);
            }
        }

        function addSticker(emoji) {
            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            if (stickers[dateKey] === emoji) delete stickers[dateKey];
            else stickers[dateKey] = emoji;
            renderCalendar(displayYear, displayMonth);
        }

        function updateSelectedDateText() {
            const m = selectedDate.getMonth() + 1;
            const d = selectedDate.getDate();
            document.getElementById('selected-date-text').innerText = `${m}월 ${d}일`;
        }

        document.getElementById('prev-month').onclick = () => {
            displayMonth--;
            if (displayMonth < 0) { displayMonth = 11; displayYear--; }
            renderCalendar(displayYear, displayMonth);
        };

        document.getElementById('next-month').onclick = () => {
            displayMonth++;
            if (displayMonth > 11) { displayMonth = 0; displayYear++; }
            renderCalendar(displayYear, displayMonth);
        };

        document.getElementById('go-today').onclick = () => {
            const now = new Date();
            displayYear = now.getFullYear();
            displayMonth = now.getMonth();
            selectedDate = new Date();
            renderCalendar(displayYear, displayMonth);
        };

        initEmojiPalette();
        renderCalendar(displayYear, displayMonth);
    </script>
</body>
</html>
