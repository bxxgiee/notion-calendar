<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Minimal Calendar</title>
    <!-- 귀엽고 둥글둥글한 폰트 적용 (Nunito 유지) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        :root {
            /* 지정해주신 색상 변수 설정 */
            --bg-color: #A7C7E7; /* 연한 하늘색 바탕 */
            --text-color: #FFFFFF; /* 흰 글씨 */
            --today-bg: #FFFFFF; /* 당일 활성화 바탕 (흰색) */
            --today-text: #A7C7E7; /* 당일 활성화 글씨 (하늘색) */
            --cell-size: 38px; /* 칸 크기 */
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* 위젯으로 쓸 때 스크롤바 방지 */
        }

        .calendar {
            width: 100%;
            max-width: 320px; 
            padding: 24px;
            box-sizing: border-box;
            /* 불필요한 테두리와 배경색, 그림자 모두 제거 (미니멀) */
        }

        .header {
            display: flex;
            justify-content: space-between; /* 양끝 정렬 (왼쪽 월/화살표, 오른쪽 today) */
            align-items: center;
            margin-bottom: 24px;
        }

        .month-controls {
            display: flex;
            align-items: center; /* 화살표와 텍스트의 수직 높낮이 완벽 정렬 */
            gap: 8px;
        }

        #month-year {
            font-size: 1.35rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;
            min-width: 95px; /* 화살표 사이 간격 유지 */
            line-height: 1; /* 텍스트 박스 높이를 글자 크기에 맞춰 화살표와 정렬되게 함 */
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2); /* 둥근 배경 */
            border: none;
            color: var(--text-color);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1); /* 깔끔하게 커지기만 함 */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, var(--cell-size)); /* 각 열의 너비를 고정 */
            gap: 6px; /* 열 간격 고정 */
            justify-content: center; /* 그리드 전체를 달력 중앙에 배치 */
        }

        .day-name {
            display: flex;
            justify-content: center;
            align-items: center;
            width: var(--cell-size);
            height: 28px;
            font-size: 0.8rem;
            font-weight: 800;
            background-color: transparent;
            border: none; /* 답답해 보이던 테두리 완전 제거 */
            margin-bottom: 12px;
            box-sizing: border-box;
            text-transform: uppercase;
            letter-spacing: 1px; /* 자간을 살짝 넓혀서 시원하게 */
            opacity: 0.8; /* 살짝 투명하게 처리해서 날짜와 부드럽게 구분 */
        }

        .day {
            display: flex;
            justify-content: center;
            align-items: center;
            width: var(--cell-size);
            height: var(--cell-size);
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none; /* 링크 밑줄 제거 */
            color: inherit;
            border-radius: 50%; /* 동그라미 선택 영역 */
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        /* 날짜에 마우스를 올렸을 때의 효과 */
        .day:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.1); /* 깔끔하게 커지기만 함 */
        }

        /* 당일 (활성화된 영역) 스타일 */
        .day.today {
            background-color: var(--today-bg);
            color: var(--today-text); /* 당일 글씨는 하늘색 */
            font-weight: 900;
            /* 그림자 완전 제거 */
        }

        .day.today:hover {
            background-color: rgba(255, 255, 255, 0.95);
            transform: scale(1.1);
        }

        /* 빈 날짜 칸 */
        .empty {
            pointer-events: none;
        }

        /* Today 버튼 스타일 수정 */
        .today-btn {
            background-color: var(--today-bg); /* 흰색 바탕 */
            color: var(--today-text); /* 하늘색 글씨 */
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            /* 그림자 완전 제거 */
        }
        
        .today-btn:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="calendar">
        <!-- 연도와 월, 그리고 우측 컨트롤 버튼들 -->
        <div class="header">
            <div class="month-controls">
                <button id="prev-month" class="nav-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div id="month-year"></div>
                <button id="next-month" class="nav-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
            <button id="go-today" class="today-btn">today</button>
        </div>
        
        <!-- 요일 -->
        <div class="grid" id="day-names">
            <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
            <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
        </div>
        
        <!-- 날짜가 들어갈 그리드 -->
        <div class="grid" id="calendar-days"></div>
    </div>

    <script>
        // ★ 중요: 이동하고 싶은 노션 데이터베이스의 공유 링크를 아래 따옴표 안에 붙여넣으세요.
        const NOTION_DB_LINK = "https://www.notion.so/사용자의_노션_데이터베이스_링크_여기에_입력";

        // 현재 화면에 표시중인 연도와 월을 저장하는 변수
        let currentDisplayDate = new Date();
        let displayYear = currentDisplayDate.getFullYear();
        let displayMonth = currentDisplayDate.getMonth();

        function renderCalendar(year, month) {
            const now = new Date();
            const realYear = now.getFullYear();
            const realMonth = now.getMonth();
            const realToday = now.getDate();

            // 달력 상단 텍스트 변경 (예: 2026. 03)
            document.getElementById('month-year').innerText = `${year}. ${String(month + 1).padStart(2, '0')}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysContainer = document.getElementById('calendar-days');
            
            // 기존 내용 초기화
            daysContainer.innerHTML = '';

            // 1일 시작 전 빈 칸 렌더링
            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'day empty';
                daysContainer.appendChild(emptyDiv);
            }

            // 1일부터 마지막 일까지 날짜 렌더링
            for (let i = 1; i <= daysInMonth; i++) {
                const dayLink = document.createElement('a');
                dayLink.href = NOTION_DB_LINK; // 클릭 시 이동할 링크
                dayLink.target = "_blank";     // 새 창에서 노션 열기
                dayLink.className = 'day';
                dayLink.innerText = i;

                // 렌더링하는 달력이 '실제 이번 달'일 때만 오늘 날짜 하이라이트
                if (year === realYear && month === realMonth && i === realToday) {
                    dayLink.classList.add('today');
                }

                daysContainer.appendChild(dayLink);
            }
        }

        // 이전 달 버튼 클릭 이벤트
        document.getElementById('prev-month').addEventListener('click', () => {
            displayMonth--;
            if (displayMonth < 0) {
                displayMonth = 11;
                displayYear--;
            }
            renderCalendar(displayYear, displayMonth);
        });

        // 다음 달 버튼 클릭 이벤트
        document.getElementById('next-month').addEventListener('click', () => {
            displayMonth++;
            if (displayMonth > 11) {
                displayMonth = 0;
                displayYear++;
            }
            renderCalendar(displayYear, displayMonth);
        });

        // today 버튼 클릭 이벤트 (오늘로 돌아가기)
        document.getElementById('go-today').addEventListener('click', () => {
            const now = new Date();
            displayYear = now.getFullYear();
            displayMonth = now.getMonth();
            renderCalendar(displayYear, displayMonth);
        });

        // 페이지 로드 시 최초 1회 달력 그리기
        renderCalendar(displayYear, displayMonth);

        // [자동 업데이트 기능] 1분마다 체크하여 자정이 지나 날짜가 바뀌면 캘린더 자동 새로고침
        setInterval(() => {
            const now = new Date();
            // 현재 화면에 표시된 달력이 '실제 이번 달'일 경우에만 자정 업데이트 확인
            if (displayYear === now.getFullYear() && displayMonth === now.getMonth()) {
                const currentDay = now.getDate();
                const displayedDayElement = document.querySelector('.day.today');
                
                if (displayedDayElement && parseInt(displayedDayElement.innerText) !== currentDay) {
                    renderCalendar(displayYear, displayMonth);
                } else if (!displayedDayElement) {
                    renderCalendar(displayYear, displayMonth);
                }
            }
        }, 60000); // 60000ms = 1분
    </script>
</body>
</html>
