<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Minimal Time & Weather - White Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-color: #FFFFFF; 
            --point-color: #A7C7E7; 
            --text-color: #A7C7E7;
            --sub-text-color: rgba(167, 199, 231, 0.8);
            --stroke-color: rgba(167, 199, 231, 0.3);
            /* 안쪽으로 은은하게 퍼지는 이너 글로우 효과 */
            --inner-glow: inset 0 0 25px rgba(167, 199, 231, 0.25);
        }

        body {
            margin: 0;
            padding: 20px; 
            background-color: transparent;
            color: var(--text-color);
            font-family: 'Nunito', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 40px);
            overflow: hidden;
            box-sizing: border-box;
        }

        .widget-box {
            width: 100%;
            max-width: 380px; 
            padding: 40px 25px; 
            box-sizing: border-box;
            background-color: var(--bg-color);
            /* 획(Border)과 이너 글로우 적용 */
            border: 1.5px solid var(--stroke-color); 
            border-radius: 20px;
            box-shadow: var(--inner-glow);
            user-select: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .time-section {
            margin-bottom: 5px;
            text-align: center;
        }

        #clock {
            font-size: clamp(2.3rem, 11vw, 3.5rem); 
            font-weight: 800; 
            letter-spacing: -1px;
            line-height: 1;
            color: var(--point-color);
        }

        #ampm {
            font-size: clamp(0.7rem, 3.5vw, 1rem);
            font-weight: 700;
            margin-left: 5px;
            opacity: 0.8;
        }

        #date {
            font-size: clamp(0.9rem, 4vw, 1.05rem);
            font-weight: 600;
            color: var(--sub-text-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .divider {
            width: 100%;
            height: 1.5px;
            border-top: 1.5px dashed var(--point-color);
            opacity: 0.3;
            margin-bottom: 25px;
        }

        .weather-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            margin-bottom: 25px;
        }

        .weather-icon {
            font-size: clamp(2.2rem, 10vw, 2.8rem);
            animation: floating 3s ease-in-out infinite;
        }

        .weather-info {
            text-align: left;
        }

        .weather-title {
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            font-weight: 400; 
            margin-bottom: 5px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--point-color);
        }

        #temp {
            font-size: clamp(1.8rem, 8vw, 2.2rem);
            font-weight: 800;
            line-height: 1;
            color: var(--point-color);
        }

        #condition {
            font-size: clamp(0.7rem, 3.2vw, 0.85rem);
            font-weight: 400;
            color: var(--sub-text-color);
            margin-top: 5px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(240, 247, 255, 0.5); /* 더 부드러운 배경색 */
            padding: 12px 15px;
            border-radius: 15px;
        }

        .forecast-item {
            text-align: center;
        }

        .forecast-label {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--point-color);
            opacity: 0.8;
        }

        .forecast-temp {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--point-color);
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div class="widget-box">
        <div class="time-section">
            <div id="clock">00:00<span id="ampm">AM</span></div>
        </div>
        <div id="date">로딩 중...</div>

        <div class="divider"></div>

        <div class="weather-content">
            <div id="weather-icon" class="weather-icon">☁️</div>
            <div class="weather-info">
                <div class="weather-title">
                    ☁️ <span id="location-name">서울</span>의 날씨
                </div>
                <div id="temp">--°C</div>
                <div id="condition">날씨 연동 중...</div>
            </div>
        </div>

        <div class="forecast-grid">
            <div class="forecast-item">
                <div class="forecast-label">오늘</div>
                <div id="today-forecast" class="forecast-temp">-- / --</div>
            </div>
            <div class="forecast-item">
                <div class="forecast-label">내일</div>
                <div id="tomorrow-forecast" class="forecast-temp">-- / --</div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const city = urlParams.get('city') || 'Seoul';
        const API_KEY = urlParams.get('key') || 'f00c38e0279b7bc85480c3fe775d518c';

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            const hStr = String(h).padStart(2, '0');
            document.getElementById('clock').innerHTML = `${hStr}:${m}<span id="ampm">${ampm}</span>`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.getElementById('date').innerText = `${year}. ${month}. ${day}. ${week[now.getDay()]}`;
        }

        function showDemoWeather() {
            document.getElementById('location-name').innerText = city + " (데모)";
            document.getElementById('temp').innerText = "22°C";
            document.getElementById('condition').innerText = "맑고 쾌적함";
            document.getElementById('today-forecast').innerText = "24° / 18°";
            document.getElementById('tomorrow-forecast').innerText = "23° / 17°";
            document.getElementById('weather-icon').innerText = "☀️";
        }

        async function getWeatherData() {
            const conditionEl = document.getElementById('condition');
            const locationEl = document.getElementById('location-name');
            const tempEl = document.getElementById('temp');
            const todayEl = document.getElementById('today-forecast');
            const tomorrowEl = document.getElementById('tomorrow-forecast');

            try {
                const encodedCity = encodeURIComponent(city);
                const currentRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodedCity}&units=metric&appid=${API_KEY}&lang=kr`);
                const currentData = await currentRes.json();

                if (currentData.cod != 200) throw new Error("연동 실패");

                locationEl.innerText = currentData.name;
                tempEl.innerText = `${Math.round(currentData.main.temp)}°C`;
                conditionEl.innerText = currentData.weather[0].description;
                todayEl.innerText = `${Math.round(currentData.main.temp_max)}° / ${Math.round(currentData.main.temp_min)}°`;

                const iconText = document.getElementById('weather-icon');
                const main = currentData.weather[0].main.toLowerCase();
                if (main.includes('cloud')) iconText.innerText = "☁️";
                else if (main.includes('rain')) iconText.innerText = "☔";
                else if (main.includes('clear')) iconText.innerText = "☀️";
                else if (main.includes('snow')) iconText.innerText = "❄️";
                else iconText.innerText = "🌤️";

                const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodedCity}&units=metric&appid=${API_KEY}&lang=kr`);
                const forecastData = await forecastRes.json();

                if (forecastData.cod == "200") {
                    const tomorrow = forecastData.list[8] || forecastData.list[0]; 
                    tomorrowEl.innerText = `${Math.round(tomorrow.main.temp_max)}° / ${Math.round(tomorrow.main.temp_min)}°`;
                }
            } catch (error) {
                showDemoWeather();
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
        getWeatherData();
        setInterval(getWeatherData, 1800000);
    </script>
</body>
</html>
